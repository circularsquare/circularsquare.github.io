<style>
  .bunny {
    position: fixed;
    z-index: 9999;
    user-select: none;
  }

  .bunny-sprite {
    width: 40px;
    height: 40px;
    background-image: url('/assets/bunnyhop-spritesheet.png');
    background-repeat: no-repeat;
    background-size: calc(40px * 7) 40px;
    image-rendering: auto;
    transform: scale(0.8);
    transform-origin: top left;
  }
</style>

<script>
  const frameCount = 7;
  const frameSize = 40;
  const frameDuration = 100;
  const airFrames = new Set([1, 2, 3]);
  const stopThreshold = 50;
  const verticalOffset = 24;
  const hopDistance = 30;
  const bunnySize = 30;
  const hitboxOffsetX = 16; // center of 32px rendered sprite
  const hitboxOffsetY = 25; // bottom-center of sprite
  const airStartMs = 100;
  const airEndMs = 400;
  const followRange = 350;
  const minPause = 0;
  const maxPause = 250;
  const wanderMinPause = 0;
  const wanderMaxPause = 2000;
  const wanderAngleRange = Math.PI / 6;

  let mouseX = parseFloat(sessionStorage.getItem('mouseX')) || 0;
  let mouseY = parseFloat(sessionStorage.getItem('mouseY')) || 0;
  let lastMouseMoveTime = 0;
  const mouseIdleTimeout = 8000;

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    lastMouseMoveTime = Date.now();
  });

  const bunnies = [];

  function createBunny(x, y, facingLeft) {
    const el = document.createElement('div');
    el.className = 'bunny';
    const spriteEl = document.createElement('div');
    spriteEl.className = 'bunny-sprite';
    el.appendChild(spriteEl);
    document.body.appendChild(el);

    const b = {
      el,
      spriteEl,
      x,
      y,
      isHopping: false,
      hopStartTime: 0,
      hopEndTime: Date.now(),
      pauseDuration: Math.random() * 1000,
      startX: x,
      startY: y,
      destX: x,
      destY: y,
      facingLeft: facingLeft || false,
    };

    el.style.transform = b.facingLeft ? "scaleX(-1)" : "scaleX(1)";

    function setFrame(index) {
      spriteEl.style.backgroundPosition = `-${index * frameSize}px 0`;
    }

    setFrame(frameCount - 1);

    el.addEventListener('click', () => {
      createBunny(b.x, b.y, b.facingLeft);
    });

    el.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      removeBunny(b);
    });

    b.setFrame = setFrame;
    bunnies.push(b);
    updateCounter();
    return b;
  }

  const bunnyCountEl = document.getElementById('bunny-count');
  const bunnyCounterEl = document.getElementById('bunny-counter');
  let rainbowActive = false;
  let rainbowFrame = null;

  function updateCounter() {
    if (bunnyCountEl) bunnyCountEl.textContent = bunnies.length;
    if (bunnyCounterEl) bunnyCounterEl.style.display = bunnies.length > 1 ? 'inline-flex' : 'none';
    const shouldRainbow = bunnies.length === 67 || bunnies.length > 200;
    if (shouldRainbow && !rainbowActive) {
      rainbowActive = true;
      (function cycleRainbow() {
        if (!rainbowActive) return;
        const hue = (Date.now() / 10) % 360;
        if (bunnyCountEl) bunnyCountEl.style.color = `hsl(${hue}, 80%, 45%)`;
        rainbowFrame = requestAnimationFrame(cycleRainbow);
      })();
    } else if (!shouldRainbow && rainbowActive) {
      rainbowActive = false;
      cancelAnimationFrame(rainbowFrame);
      if (bunnyCountEl) bunnyCountEl.style.color = '';
    }
  }

  function removeBunny(b) {
    if (bunnies.length <= 1) return; // always keep at least one
    b.el.remove();
    bunnies.splice(bunnies.indexOf(b), 1);
    updateCounter();
  }

  // Restore bunnies from localStorage, or create one in the middle of the screen
  const saved = JSON.parse(localStorage.getItem('bunnies') || '[]');
  if (saved.length > 0) {
    for (const { x, y, facingLeft } of saved) {
      createBunny(x, y, facingLeft);
    }
  } else {
    createBunny(
      window.innerWidth / 3 + Math.random() * window.innerWidth / 3,
      window.innerHeight / 3 + Math.random() * window.innerHeight / 3
    );
  }

  function saveBunnies() {
    sessionStorage.setItem('mouseX', mouseX);
    sessionStorage.setItem('mouseY', mouseY);
    localStorage.setItem('bunnies', JSON.stringify(
      bunnies.map(b => ({ x: b.x, y: b.y, facingLeft: b.facingLeft }))
    ));
  }

  window.addEventListener('beforeunload', saveBunnies);
  window.addEventListener('pagehide', saveBunnies);
  setInterval(saveBunnies, 2000);

  function hitboxCenter(bun, useDest) {
    const px = useDest ? bun.destX : bun.x;
    const py = useDest ? bun.destY : bun.y;
    return { x: px + hitboxOffsetX, y: py + hitboxOffsetY };
  }

  function animate() {
    const now = Date.now();

    for (const b of bunnies) {
      const distance = Math.hypot(mouseX - b.x, mouseY - b.y);

      if (b.isHopping) {
        const elapsed = now - b.hopStartTime;
        const frame = Math.min(Math.floor(elapsed / frameDuration), frameCount - 1);

        b.setFrame(frame);

        // Lerp from start to destination during air time
        if (elapsed >= airStartMs && elapsed < airEndMs) {
          const t = (elapsed - airStartMs) / (airEndMs - airStartMs);
          b.x = b.startX + (b.destX - b.startX) * t;
          b.y = b.startY + (b.destY - b.startY) * t;
        } else if (elapsed >= airEndMs) {
          b.x = b.destX;
          b.y = b.destY;
        }

        if (elapsed >= frameCount * frameDuration) {
          b.isHopping = false;
          b.hopEndTime = now;
          const following = distance < followRange && now - lastMouseMoveTime < mouseIdleTimeout;
          b.pauseDuration = following
            ? minPause + Math.random() * (maxPause - minPause)
            : wanderMinPause + Math.random() * (wanderMaxPause - wanderMinPause);
          b.setFrame(frameCount - 1);
        }
      } else if (now - b.hopEndTime > b.pauseDuration) {
        let shouldHop = false;
        let destX, destY;

        // Check if overlapping with another bunny — hop away immediately
        const bHit = hitboxCenter(b, false);
        for (const other of bunnies) {
          if (other === b) continue;
          const oHit = hitboxCenter(other, other.isHopping);
          const d = Math.hypot(bHit.x - oHit.x, bHit.y - oHit.y);
          if (d < bunnySize) {
            shouldHop = true;
            if (d < 1) {
              const randAngle = Math.random() * Math.PI * 2;
              destX = b.x + Math.cos(randAngle) * hopDistance;
              destY = b.y + Math.sin(randAngle) * hopDistance;
            } else {
              destX = b.x + (bHit.x - oHit.x) / d * hopDistance;
              destY = b.y + (bHit.y - oHit.y) / d * hopDistance;
            }
            break;
          }
        }

        // If only bunny and off-screen, hop toward nearest screen edge
        const offScreen = b.x < -32 || b.x > window.innerWidth || b.y < -32 || b.y > window.innerHeight;
        if (!shouldHop && bunnies.length === 1 && offScreen) {
          shouldHop = true;
          const targetX = Math.max(32, Math.min(window.innerWidth - 32, b.x));
          const targetY = Math.max(32, Math.min(window.innerHeight - 32, b.y));
          const d = Math.hypot(targetX - b.x, targetY - b.y);
          if (d > 1) {
            destX = b.x + (targetX - b.x) / d * hopDistance;
            destY = b.y + (targetY - b.y) / d * hopDistance;
          } else {
            destX = b.x;
            destY = b.y;
          }
        }

        const following = distance < followRange && now - lastMouseMoveTime < mouseIdleTimeout;

        if (!shouldHop && following && distance > stopThreshold) {
          shouldHop = true;
          const hopDist = Math.min(hopDistance, distance);
          destX = b.x + (mouseX - b.x) / distance * hopDist;
          destY = b.y + (mouseY - b.y) / distance * hopDist;
        } else if (!shouldHop && !(following && distance <= stopThreshold)) {
          // Wander: not following, or following but cursor is out of range
          shouldHop = true;
          const angle = (Math.random() - 0.5) * 2 * wanderAngleRange;
          const direction = Math.random() < 0.5 ? -1 : 1;
          destX = b.x + Math.cos(angle) * direction * hopDistance;
          destY = b.y + Math.sin(angle) * hopDistance;
        }

        if (shouldHop) {
          // Shift destination away from other bunnies
          const destHitX = destX + hitboxOffsetX;
          const destHitY = destY + hitboxOffsetY;
          for (const other of bunnies) {
            if (other === b) continue;
            const oHit = hitboxCenter(other, other.isHopping);
            const d = Math.hypot(destHitX - oHit.x, destHitY - oHit.y);
            if (d < bunnySize) {
              if (d < 1) {
                const randAngle = Math.random() * Math.PI * 2;
                destX += Math.cos(randAngle) * bunnySize;
                destY += Math.sin(randAngle) * bunnySize;
              } else {
                destX += (destHitX - oHit.x) / d * (bunnySize - d);
                destY += (destHitY - oHit.y) / d * (bunnySize - d);
              }
            }
          }

          // Cap hop distance
          const maxDist = hopDistance * 1.2;
          const actualDist = Math.hypot(destX - b.x, destY - b.y);
          if (actualDist > maxDist) {
            destX = b.x + (destX - b.x) / actualDist * maxDist;
            destY = b.y + (destY - b.y) / actualDist * maxDist;
          }

          b.isHopping = true;
          b.hopStartTime = now;
          b.startX = b.x;
          b.startY = b.y;
          b.destX = destX;
          b.destY = destY;
          b.facingLeft = destX - b.x > 0;
          b.el.style.transform = b.facingLeft ? "scaleX(-1)" : "scaleX(1)";
        }
      }

      b.el.style.left = b.x + 'px';
      b.el.style.top = (b.y - verticalOffset) + 'px';
    }

    requestAnimationFrame(animate);
  }

  animate();

  // Clear button in header
  const clearBtn = document.getElementById('bunny-clear');
  if (clearBtn) {
    clearBtn.addEventListener('click', (e) => {
      e.preventDefault();
      while (bunnies.length > 1) {
        removeBunny(bunnies[bunnies.length - 1]);
      }
    });
  }

</script>
