<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess the City</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f4f7f2;
      --surface: #ffffff;
      --surface-hover: #eef3eb;
      --border: #d0d9ca;
      --text: #2c3527;
      --text-dim: #6b7a63;
      --accent: #4a8c3f;
      --accent-light: #e2f0de;
      --red: #c0392b;
      --red-light: #fdecea;
      --warm: #c97d1e;
      --radius: 8px;
      --font-mono: "DM Mono", monospace;
      --font-body: "DM Sans", sans-serif;
      --map-size: 450px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body); background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
    }

    header {
      width: 100%; max-width: 1200px; padding: 16px 24px 0;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; flex-shrink: 0;
    }
    header h1 {
      font-family: var(--font-mono); font-size: 1.1rem;
      font-weight: 500; letter-spacing: 0.04em; color: var(--accent);
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .scoreboard {
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--text-dim); display: flex; gap: 16px;
    }
    .scoreboard span { color: var(--text); font-weight: 500; }
    .difficulty-select {
      font-family: var(--font-mono); font-size: 0.78rem; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); color: var(--text); cursor: pointer;
    }
    .difficulty-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    .timer-bar-wrapper {
      width: 100%; max-width: 1200px; padding: 10px 24px 0; flex-shrink: 0;
    }
    .timer-bar-track {
      width: 100%; height: 5px; background: var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.25s linear, background 0.3s; width: 100%;
    }
    .timer-bar-fill.low { background: var(--warm); }
    .timer-bar-fill.critical { background: var(--red); }
    .timer-label {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim);
      margin-top: 3px; display: flex; justify-content: space-between;
    }
    .timer-label span { font-weight: 500; color: var(--text); }

    .game-area {
      width: 100%; max-width: 1200px; padding: 12px 24px;
      display: flex; gap: 16px; justify-content: center; flex-shrink: 0;
    }
    .map-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .map-panel-header {
      padding: 10px 14px; display: flex; justify-content: space-between;
      align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-panel-header h2 {
      font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim);
    }
    .badge {
      font-family: var(--font-mono); font-size: 0.7rem;
      padding: 2px 7px; border-radius: 4px;
    }
    .badge-accent { color: var(--accent); background: var(--accent-light); }

    .clue-clip-wrapper {
      width: var(--map-size); height: var(--map-size);
      overflow: hidden; position: relative; flex-shrink: 0;
    }
    #clue-map {
      width: calc(var(--map-size) * 2.1);
      height: calc(var(--map-size) * 2.1);
      position: absolute; left: 50%; top: 50%;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
    }
    #clue-map .leaflet-tile-pane {
      filter: brightness(0.85) contrast(1.25);
    }

    .map-container {
      width: var(--map-size); height: var(--map-size); flex-shrink: 0;
    }

    .controls {
      width: 100%; max-width: 1200px; padding: 8px 24px 16px;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; flex-shrink: 0;
    }
    button {
      font-family: var(--font-mono); font-size: 0.82rem; padding: 9px 18px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text); cursor: pointer;
      transition: all 0.15s ease;
    }
    button:hover { background: var(--surface-hover); border-color: var(--accent); }
    button:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--border); }
    button.primary {
      background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500;
    }
    button.primary:hover { filter: brightness(1.08); }
    button.primary:disabled { filter: none; opacity: 0.35; }
    .wrong-feedback {
      font-family: var(--font-mono); font-size: 0.82rem; color: var(--red);
      background: var(--red-light); padding: 5px 12px; border-radius: var(--radius);
      animation: fadeSlideIn 0.25s ease; display: none;
    }
    .wrong-feedback.visible { display: block; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(44, 53, 39, 0.35); backdrop-filter: blur(6px);
      z-index: 9999; justify-content: center; align-items: center;
    }
    .result-overlay.visible { display: flex; }
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px 40px; text-align: center;
      max-width: 380px; width: 90%; animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .result-card h3 { font-family: var(--font-mono); font-size: 0.95rem; margin-bottom: 6px; color: var(--text-dim); }
    .result-city { font-size: 1.5rem; font-weight: 700; margin-bottom: 14px; color: var(--accent); }
    .result-detail { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; }
    .result-points { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 500; margin-bottom: 20px; }
    .result-points.win  { color: var(--accent); }
    .result-points.lose { color: var(--red); }
    .final-score { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin: 10px 0; }

    .leaflet-container { background: #eef3eb; }
    .leaflet-control-attribution {
      background: #cde7b7 !important;
      color: var(--text-dim) !important; font-size: 0.6rem !important;
    }
    .leaflet-control-attribution a { color: var(--text-dim) !important; }

    @media (max-width: 820px) {
      html, body { overflow: auto; }
      .game-area { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <header>
    <h1>// GUESS THE CITY</h1>
    <div class="header-right">
      <select class="difficulty-select" id="difficulty-select">
        <option value="easy">Easy (50)</option>
        <option value="medium" selected>Medium (200)</option>
        <option value="hard">Hard (500)</option>
      </select>
      <div class="scoreboard">
        Round: <span id="round-display">1 / 5</span>
        &middot; Score: <span id="score-display">0</span>
      </div>
    </div>
  </header>

  <div class="timer-bar-wrapper">
    <div class="timer-bar-track">
      <div class="timer-bar-fill" id="timer-fill"></div>
    </div>
    <div class="timer-label">
      <span id="timer-text">60.0s</span>
      <span id="zoom-label">zoom 16.0</span>
    </div>
  </div>

  <div class="game-area">
    <div class="map-panel">
      <div class="map-panel-header">
        <h2>Clue Map</h2>
        <div class="badge badge-accent">auto-zoom</div>
      </div>
      <div class="clue-clip-wrapper" id="clue-clip">
        <div id="clue-map"></div>
      </div>
    </div>
    <div class="map-panel">
      <div class="map-panel-header">
        <h2>Your Guess</h2>
        <div class="badge badge-accent" id="guess-hint">click to place pin</div>
      </div>
      <div id="answer-map" class="map-container"></div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-submit" class="primary" disabled>Submit Guess</button>
    <div id="wrong-feedback" class="wrong-feedback"></div>
  </div>

  <div class="result-overlay" id="result-overlay">
    <div class="result-card" id="result-card"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* ==========================================================
       CITY DATA
       ========================================================== */
    const CITIES_EASY = [
      { name: "New York",       country: "USA",          latlng: [40.7128, -74.006] },
      { name: "Paris",          country: "France",       latlng: [48.8566, 2.3522] },
      { name: "Tokyo",          country: "Japan",        latlng: [35.6762, 139.6503] },
      { name: "London",         country: "UK",           latlng: [51.5074, -0.1278] },
      { name: "Sydney",         country: "Australia",    latlng: [-33.8688, 151.2093] },
      { name: "Rome",           country: "Italy",        latlng: [41.9028, 12.4964] },
      { name: "Cairo",          country: "Egypt",        latlng: [30.0444, 31.2357] },
      { name: "Istanbul",       country: "Turkey",       latlng: [41.0082, 28.9784] },
      { name: "Mumbai",         country: "India",        latlng: [19.076, 72.8777] },
      { name: "Buenos Aires",   country: "Argentina",    latlng: [-34.6037, -58.3816] },
      { name: "Singapore",      country: "Singapore",    latlng: [1.3521, 103.8198] },
      { name: "Barcelona",      country: "Spain",        latlng: [41.3874, 2.1686] },
    ];

    const CITIES_MEDIUM = [
      ...CITIES_EASY,
      { name: "São Paulo",      country: "Brazil",       latlng: [-23.5505, -46.6333] },
      { name: "Lagos",          country: "Nigeria",      latlng: [6.5244, 3.3792] },
      { name: "Moscow",         country: "Russia",       latlng: [55.7558, 37.6173] },
      { name: "Bangkok",        country: "Thailand",     latlng: [13.7563, 100.5018] },
      { name: "Berlin",         country: "Germany",      latlng: [52.52, 13.405] },
      { name: "Mexico City",    country: "Mexico",       latlng: [19.4326, -99.1332] },
      { name: "Seoul",          country: "South Korea",  latlng: [37.5665, 126.978] },
      { name: "Nairobi",        country: "Kenya",        latlng: [-1.2921, 36.8219] },
      { name: "Toronto",        country: "Canada",       latlng: [43.6532, -79.3832] },
      { name: "Lima",           country: "Peru",         latlng: [-12.0464, -77.0428] },
      { name: "Cape Town",      country: "South Africa", latlng: [-33.9249, 18.4241] },
      { name: "Hanoi",          country: "Vietnam",      latlng: [21.0285, 105.8542] },
      { name: "Lisbon",         country: "Portugal",     latlng: [38.7223, -9.1393] },
      { name: "Amsterdam",      country: "Netherlands",  latlng: [52.3676, 4.9041] },
      { name: "Athens",         country: "Greece",       latlng: [37.9838, 23.7275] },
      { name: "Taipei",         country: "Taiwan",       latlng: [25.033, 121.5654] },
      { name: "Prague",         country: "Czechia",      latlng: [50.0755, 14.4378] },
    ];

    const CITIES_HARD = [
      ...CITIES_MEDIUM,
      { name: "Havana",         country: "Cuba",         latlng: [23.1136, -82.3666] },
      { name: "Marrakech",      country: "Morocco",      latlng: [31.6295, -7.9811] },
      { name: "Stockholm",      country: "Sweden",       latlng: [59.3293, 18.0686] },
      { name: "Reykjavik",      country: "Iceland",      latlng: [64.1466, -21.9426] },
      { name: "Dublin",         country: "Ireland",      latlng: [53.3498, -6.2603] },
      { name: "Kathmandu",      country: "Nepal",        latlng: [27.7172, 85.324] },
      { name: "Kyoto",          country: "Japan",        latlng: [35.0116, 135.7681] },
      { name: "Vancouver",      country: "Canada",       latlng: [49.2827, -123.1207] },
      { name: "Oslo",           country: "Norway",       latlng: [59.9139, 10.7522] },
      { name: "Bogotá",         country: "Colombia",     latlng: [4.711, -74.0721] },
      { name: "Santiago",       country: "Chile",        latlng: [-33.4489, -70.6693] },
    ];

    const CITY_POOLS = { easy: CITIES_EASY, medium: CITIES_MEDIUM, hard: CITIES_HARD };

    const CONFIG = {
      roundsPerGame: 5,
      totalTime: 60,
      startZoom: 16,
      endZoom: 4,
      winRadius: 250,
      penalty: 5,
    };

    /* ==========================================================
       TILES
       ========================================================== */
    const TILE_URL_CLUE   = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png";
    const TILE_URL_ANSWER = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
    const TILE_ATTR =
      '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> ' +
      '&copy; <a href="https://carto.com/">CARTO</a>';
    const TILE_PRELOAD_BASE = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}.png";
    const SUBDOMAINS = ["a", "b", "c", "d"];

    /* ==========================================================
       MAP SIZE
       ========================================================== */
    function computeMapSize() {
      const headerH = document.querySelector("header").offsetHeight;
      const timerH = document.querySelector(".timer-bar-wrapper").offsetHeight;
      const controlsH = document.querySelector(".controls").offsetHeight;
      const chrome = headerH + timerH + controlsH + 70;
      const availH = window.innerHeight - chrome;
      const panelHeaderH = 38;
      const maxFromHeight = availH - panelHeaderH;
      const containerW = Math.min(window.innerWidth, 1200);
      const isStacked = window.innerWidth <= 820;
      const maxW = isStacked ? containerW - 48 : (containerW - 64) / 2;
      const size = Math.max(200, Math.floor(Math.min(maxFromHeight, maxW)));
      document.documentElement.style.setProperty("--map-size", size + "px");
      clueMap.invalidateSize();
      answerMap.invalidateSize();
    }

    /* ==========================================================
       STATE
       ========================================================== */
    let state = {
      round: 0,
      score: 0,
      currentCity: null,
      guessLatLng: null,
      citiesThisGame: [],
      timeRemaining: CONFIG.totalTime,
      roundActive: false,
      currentBaseZoom: CONFIG.startZoom,
      animFrameId: null,
      animStartTime: null,
      animTimeOffset: 0,
      _lastUIUpdate: 0,
      // Lock to prevent overlapping swap sequences
      swapInProgress: false,
    };

    /* ==========================================================
       CLUE MAP
       ========================================================== */
    const clueMap = L.map("clue-map", {
      zoomControl: false,
      dragging: false,
      touchZoom: false,
      doubleClickZoom: false,
      scrollWheelZoom: false,
      boxZoom: false,
      keyboard: false,
      fadeAnimation: false,
      zoomAnimation: false,
    }).setView([0, 0], CONFIG.startZoom);

    const clueMapEl = document.getElementById("clue-map");

    function makeTileLayer(opts = {}) {
      return L.tileLayer(TILE_URL_CLUE, {
        attribution: TILE_ATTR,
        keepBuffer: 10,
        updateWhenZooming: false,
        ...opts,
      });
    }

    let frontLayer = makeTileLayer().addTo(clueMap);

    /* ==========================================================
       TILE PRELOADING — hidden Image() only
       ==========================================================
       Pure HTTP cache priming. No Leaflet manipulation.
       Uses multiple subdomains to match what Leaflet requests.
       ========================================================== */

    function latLngToTile(lat, lng, zoom) {
      const n = Math.pow(2, zoom);
      const x = Math.floor(((lng + 180) / 360) * n);
      const latRad = (lat * Math.PI) / 180;
      const y = Math.floor(
        ((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2) * n
      );
      return { x, y };
    }

    let preloadedZooms = new Set();

    function preloadTilesForZoom(lat, lng, zoom) {
      if (preloadedZooms.has(zoom)) return;
      preloadedZooms.add(zoom);

      const center = latLngToTile(lat, lng, zoom);
      const mapPx = parseFloat(getComputedStyle(document.documentElement)
        .getPropertyValue("--map-size")) * 2.1 || 945;
      const tilesAcross = Math.ceil(mapPx / 256);
      const radius = Math.ceil(tilesAcross / 2) + 1;

      for (let dx = -radius; dx <= radius; dx++) {
        for (let dy = -radius; dy <= radius; dy++) {
          const tx = center.x + dx;
          const ty = center.y + dy;
          // Match the subdomain Leaflet would use
          const s = SUBDOMAINS[(tx + ty) % SUBDOMAINS.length];
          const url = TILE_PRELOAD_BASE
            .replace("{s}", s)
            .replace("{z}", zoom)
            .replace("{x}", tx)
            .replace("{y}", ty);
          new Image().src = url;
        }
      }
    }

    /* ==========================================================
       STAGGERED ZOOM TRANSITION
       ==========================================================
       The key insight: we never flip the map zoom for preloading.
       Instead we rely purely on Image() cache priming.

       When crossing an integer zoom boundary, the sequence is:

       1. Set Leaflet to new zoom level
          (tiles load from HTTP cache, hopefully instant)
       2. Wait 80ms for tiles to paint
       3. Reset CSS scale to 1.0 (the new tiles fill the view)
       4. Continue rAF animation from scale(1) for this segment

       The old tiles get replaced by Leaflet internally when
       setView changes the zoom — but since the new tiles are
       cached, they should appear in the same frame or the next.
       We also set keepBuffer high so old tiles linger in the
       DOM briefly as a fallback.
       ========================================================== */

    async function staggeredSwap() {
      if (state.swapInProgress || !state.roundActive) return;
      state.swapInProgress = true;

      const nextZoom = state.currentBaseZoom - 1;
      if (nextZoom < CONFIG.endZoom) {
        state.swapInProgress = false;
        return;
      }

      /* --- NEW: DOM SNAPSHOT FOREGROUND LOGIC --- */
      let foregroundContainer = document.getElementById('clue-foreground-container');
      if (!foregroundContainer) {
        foregroundContainer = document.createElement('div');
        foregroundContainer.id = 'clue-foreground-container';
        foregroundContainer.style.position = 'absolute';
        foregroundContainer.style.inset = '0';
        foregroundContainer.style.pointerEvents = 'none';
        // z-index 1000 keeps it on top of Leaflet's internal panes
        foregroundContainer.style.zIndex = '1000'; 
        clueMapEl.appendChild(foregroundContainer);
      }

      // 1. Shrink all past clones by half to match the new zooming-out scale
      Array.from(foregroundContainer.children).forEach(child => {
        const currentScale = parseFloat(child.dataset.scale);
        const newScale = currentScale * 0.5;
        child.dataset.scale = newScale;
        child.style.transform = `scale(${newScale})`;
      });

      // 2. Clone Leaflet's current map pane (the high-res tiles) before it changes
      const mapPane = clueMap.getPane('mapPane');
      const clone = mapPane.cloneNode(true);

      // 3. Wrap the clone in a container that scales perfectly from the map center
      const wrapper = document.createElement('div');
      wrapper.dataset.scale = "0.5";
      wrapper.style.position = 'absolute';
      wrapper.style.inset = '0';
      wrapper.style.transformOrigin = 'center center';
      wrapper.style.transform = 'scale(0.5)';
      wrapper.appendChild(clone);
      
      // 4. Add it to the top of the stack
      foregroundContainer.appendChild(wrapper);
      /* --- END FOREGROUND LOGIC --- */

      state.currentBaseZoom = nextZoom;

      // Swap Leaflet to the new zoom level (the new lower-res tiles load behind our clones)
      clueMap.setView(state.currentCity.latlng, nextZoom, { animate: false });

      await delay(100);

      // Preload the next NEXT zoom level
      const nextNextZoom = nextZoom - 1;
      if (nextNextZoom >= CONFIG.endZoom) {
        preloadTilesForZoom(
          state.currentCity.latlng[0],
          state.currentCity.latlng[1],
          nextNextZoom
        );
      }

      state.swapInProgress = false;
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    /* ==========================================================
       EXPONENTIAL rAF ZOOM
       ========================================================== */
    const ZOOM_RANGE = CONFIG.startZoom - CONFIG.endZoom;

    function effectiveZoom(elapsed) {
      const t = Math.min(elapsed / CONFIG.totalTime, 1);
      return CONFIG.startZoom - t * ZOOM_RANGE;
    }

    function animationLoop(timestamp) {
      if (!state.roundActive) return;

      if (state.animStartTime === null) {
        state.animStartTime = timestamp;
      }

      const elapsed = (timestamp - state.animStartTime) / 1000 + state.animTimeOffset;
      state.timeRemaining = Math.max(0, CONFIG.totalTime - elapsed);

      if (state.timeRemaining <= 0) {
        state.timeRemaining = 0;
        endRound(false, 0);
        return;
      }

      const ez = effectiveZoom(elapsed);
      const targetBase = Math.max(CONFIG.endZoom, Math.ceil(ez));

      // Cross integer boundary → trigger staggered swap
      if (targetBase < state.currentBaseZoom && !state.swapInProgress) {
        staggeredSwap();
      }

      // CSS scale: based on distance from current base zoom
      const fraction = state.currentBaseZoom - ez;
      const scale = Math.pow(2, -fraction);
      clueMapEl.style.transform = `translate(-50%, -50%) scale(${scale})`;

      // Preload early: at 15% through each segment
      if (fraction > 0.15 && !state.swapInProgress) {
        const nextZoom = state.currentBaseZoom - 1;
        if (nextZoom >= CONFIG.endZoom) {
          preloadTilesForZoom(
            state.currentCity.latlng[0],
            state.currentCity.latlng[1],
            nextZoom
          );
        }
      }

      // UI at ~4Hz
      if (timestamp - state._lastUIUpdate > 250) {
        state._lastUIUpdate = timestamp;
        updateTimerUI();
      }

      state.animFrameId = requestAnimationFrame(animationLoop);
    }

    function startAnimation() {
      state.animStartTime = null;
      state.animTimeOffset = 0;
      state._lastUIUpdate = 0;
      state.swapInProgress = false;
      clueMapEl.style.transition = "none";
      state.animFrameId = requestAnimationFrame(animationLoop);
    }

    function stopAnimation() {
      if (state.animFrameId) {
        cancelAnimationFrame(state.animFrameId);
        state.animFrameId = null;
      }
    }

    /* ==========================================================
       ANSWER MAP
       ========================================================== */
    const answerMap = L.map("answer-map", { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer(TILE_URL_ANSWER, { attribution: TILE_ATTR }).addTo(answerMap);

    let guessCircle = null;
    const GUESS_CIRCLE_STYLE = {
      radius: CONFIG.winRadius * 1000,
      color: "#4a8c3f", weight: 2,
      fillColor: "#4a8c3f", fillOpacity: 0.10, dashArray: "6 4",
    };

    answerMap.on("click", function (e) {
      if (!state.roundActive) return;
      state.guessLatLng = e.latlng;
      if (guessCircle) guessCircle.setLatLng(e.latlng);
      else guessCircle = L.circle(e.latlng, GUESS_CIRCLE_STYLE).addTo(answerMap);
      document.getElementById("btn-submit").disabled = false;
      document.getElementById("guess-hint").textContent =
        `${e.latlng.lat.toFixed(2)}, ${e.latlng.lng.toFixed(2)}`;
    });

    /* ==========================================================
       UTILITIES
       ========================================================== */
    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = (d) => (d * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function calcPoints(tr) { return Math.max(0, Math.round(tr)); }

    function formatDist(km) {
      if (km < 1) return `${Math.round(km * 1000)} m`;
      if (km < 100) return `${km.toFixed(1)} km`;
      return `${Math.round(km).toLocaleString()} km`;
    }

    function getCityPool() {
      return CITY_POOLS[document.getElementById("difficulty-select").value] || CITIES_MEDIUM;
    }

    document.getElementById("difficulty-select").addEventListener("change", () => {
      stopAnimation(); startGame();
    });

    function updateTimerUI() {
      const t = state.timeRemaining;
      const pct = (t / CONFIG.totalTime) * 100;
      const fill = document.getElementById("timer-fill");
      fill.style.width = `${pct}%`;
      fill.classList.toggle("low", pct <= 40 && pct > 15);
      fill.classList.toggle("critical", pct <= 15);
      document.getElementById("timer-text").textContent = `${t.toFixed(1)}s`;
      const ez = CONFIG.startZoom - ((CONFIG.totalTime - t) / CONFIG.totalTime) * ZOOM_RANGE;
      document.getElementById("zoom-label").textContent = `zoom ${ez.toFixed(1)}`;
    }

    /* ==========================================================
       GAME FLOW
       ========================================================== */
    function startGame() {
      state.round = 0;
      state.score = 0;
      state.citiesThisGame = shuffle(getCityPool()).slice(0, CONFIG.roundsPerGame);
      updateScoreboard();
      startRound();
    }

    function startRound() {
      const city = state.citiesThisGame[state.round];
      state.currentCity = city;
      state.guessLatLng = null;
      state.timeRemaining = CONFIG.totalTime;
      state.roundActive = true;
      state.currentBaseZoom = CONFIG.startZoom;
      state.swapInProgress = false;
      preloadedZooms = new Set();
      // NEW: Clear the snapshot backdrops for the new round
      const existingForeground = document.getElementById('clue-foreground-container');
      if (existingForeground) {
        existingForeground.innerHTML = '';
      }

      clueMapEl.style.transition = "none";
      clueMapEl.style.transform = "translate(-50%, -50%) scale(1.005)";
      clueMap.setView(city.latlng, CONFIG.startZoom, { animate: false });

      // Preload the next two zoom levels right away
      preloadTilesForZoom(city.latlng[0], city.latlng[1], CONFIG.startZoom - 1);
      preloadTilesForZoom(city.latlng[0], city.latlng[1], CONFIG.startZoom - 2);

      answerMap.setView([20, 0], 2, { animate: false });
      if (guessCircle) { answerMap.removeLayer(guessCircle); guessCircle = null; }

      document.getElementById("btn-submit").disabled = true;
      document.getElementById("guess-hint").textContent = "click to place pin";
      hideWrongFeedback();
      updateTimerUI();
      updateScoreboard();

      // Delay start so initial tiles load + preloads have time
      setTimeout(() => startAnimation(), 600);
    }

    function submitGuess() {
      if (!state.guessLatLng || !state.roundActive) return;

      const city = state.currentCity;
      const dist = haversineKm(
        state.guessLatLng.lat, state.guessLatLng.lng,
        city.latlng[0], city.latlng[1]
      );

      if (dist <= CONFIG.winRadius) {
        stopAnimation();
        const pts = calcPoints(state.timeRemaining);
        state.score += pts;
        endRound(true, pts, dist);
      } else {
        state.animTimeOffset += CONFIG.penalty;
        state.timeRemaining = Math.max(0, state.timeRemaining - CONFIG.penalty);

        const elapsed = CONFIG.totalTime - state.timeRemaining;
        const ez = effectiveZoom(elapsed);
        const targetBase = Math.max(CONFIG.endZoom, Math.ceil(ez));

        // Handle jumping past zoom boundaries from penalty
        while (targetBase < state.currentBaseZoom) {
          state.currentBaseZoom--;
          clueMap.setView(city.latlng, state.currentBaseZoom, { animate: false });
        }

        const fraction = state.currentBaseZoom - ez;
        const scale = Math.pow(2, -fraction);
        clueMapEl.style.transform = `translate(-50%, -50%) scale(${scale})`;

        updateTimerUI();
        showWrongFeedback(dist);

        if (state.timeRemaining <= 0) {
          stopAnimation();
          endRound(false, 0);
        }
      }
    }

    function showWrongFeedback(dist) {
      const el = document.getElementById("wrong-feedback");
      el.textContent = `✗ ${formatDist(dist)} away · −${CONFIG.penalty}s`;
      el.classList.remove("visible");
      void el.offsetWidth;
      el.classList.add("visible");
    }
    function hideWrongFeedback() {
      document.getElementById("wrong-feedback").classList.remove("visible");
    }

    function endRound(won, pts, dist) {
      state.roundActive = false;
      stopAnimation();
      const city = state.currentCity;

      clueMapEl.style.transition = "none";
      clueMapEl.style.transform = "translate(-50%, -50%) scale(1)";
      clueMap.setView(city.latlng, 6, { animate: false });

      const trueMarker = L.circleMarker(city.latlng, {
        radius: 8, color: "#4a8c3f",
        fillColor: "#4a8c3f", fillOpacity: 0.9, weight: 2,
      }).addTo(answerMap);

      let line = null;
      if (state.guessLatLng) {
        line = L.polyline([state.guessLatLng, city.latlng], {
          color: won ? "#4a8c3f" : "#c0392b", weight: 2, dashArray: "6 4",
        }).addTo(answerMap);
        answerMap.fitBounds(
          L.latLngBounds([state.guessLatLng, city.latlng]),
          { padding: [40, 40] }
        );
      }

      const isLast = state.round + 1 >= CONFIG.roundsPerGame;
      const card = document.getElementById("result-card");

      if (won) {
        card.innerHTML = `
          <h3>The city was</h3>
          <div class="result-city">${city.name}, ${city.country}</div>
          <div class="result-detail">${formatDist(dist)} away — within ${CONFIG.winRadius} km!</div>
          <div class="result-detail">${state.timeRemaining.toFixed(1)}s remaining</div>
          <div class="result-points win">+${pts} pts</div>
          <button class="primary" style="width:100%">
            ${isLast ? "See Final Score" : "Next City →"}
          </button>`;
      } else {
        card.innerHTML = `
          <h3>The city was</h3>
          <div class="result-city">${city.name}, ${city.country}</div>
          <div class="result-detail">Time's up!</div>
          <div class="result-points lose">+0 pts</div>
          <button class="primary" style="width:100%">
            ${isLast ? "See Final Score" : "Next City →"}
          </button>`;
      }

      document.getElementById("result-overlay").classList.add("visible");
      updateScoreboard();

      const handler = () => {
        document.getElementById("result-overlay").classList.remove("visible");
        answerMap.removeLayer(trueMarker);
        if (line) answerMap.removeLayer(line);
        document.getElementById("result-overlay").removeEventListener("click", handler);
        state.round++;
        if (state.round >= CONFIG.roundsPerGame) showGameOver();
        else startRound();
      };
      setTimeout(() => document.getElementById("result-overlay").addEventListener("click", handler), 300);
    }

    function showGameOver() {
      const maxPossible = CONFIG.totalTime * CONFIG.roundsPerGame;
      const pct = Math.round((state.score / maxPossible) * 100);
      const card = document.getElementById("result-card");
      card.innerHTML = `
        <h3>Game Over</h3>
        <div class="final-score">${state.score} / ${maxPossible}</div>
        <div class="result-detail">${pct}% of max possible</div>
        <br/>
        <button class="primary" style="width:100%" onclick="dismissAndRestart()">Play Again</button>`;
      document.getElementById("result-overlay").classList.add("visible");
    }

    function dismissAndRestart() {
      document.getElementById("result-overlay").classList.remove("visible");
      startGame();
    }

    function updateScoreboard() {
      document.getElementById("round-display").textContent =
        `${state.round + 1} / ${CONFIG.roundsPerGame}`;
      document.getElementById("score-display").textContent = state.score;
    }

    document.getElementById("btn-submit").addEventListener("click", submitGuess);
    window.addEventListener("resize", computeMapSize);

    requestAnimationFrame(() => {
      computeMapSize();
      startGame();
    });
  </script>
</body>
</html>
