<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>guess the city!</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f4f7f2;
      --surface: #ffffff;
      --surface-hover: #eef3eb;
      --border: #d0d9ca;
      --text: #2c3527;
      --text-dim: #6b7a63;
      --accent: #4a8c3f;
      --accent-light: #e2f0de;
      --red: #c0392b;
      --red-light: #fdecea;
      --warm: #c97d1e;
      --radius: 8px;
      --font-mono: "DM Sans", monospace;
      --font-body: "DM Sans", sans-serif;
      --map-size: 450px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-body); background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
    }

    header {
      width: 100%; max-width: 1200px; padding: 16px 20px 4px;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; flex-shrink: 0;
    }
    header h1 {
      font-family: var(--font-mono); font-size: 1.1rem;
      font-weight: 500; letter-spacing: 0.04em; color: var(--accent);
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .scoreboard {
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--text-dim); display: flex; gap: 4px;
    }
    .scoreboard span { color: var(--text); font-weight: 500; }
    .difficulty-select {
      font-family: var(--font-mono); font-size: 0.78rem; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); color: var(--text); cursor: pointer;
    }
    .difficulty-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .mode-toggle {
      font-family: var(--font-mono); font-size: 0.78rem; padding: 4px 8px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); color: var(--text); cursor: pointer;
      transition: all 0.15s ease; white-space: nowrap;
    }
    .mode-toggle:hover { border-color: var(--accent); }
    .mode-toggle.satellite { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    .timer-bar-wrapper {
      width: 100%; max-width: 1200px; padding: 8px 24px 0; flex-shrink: 0;
    }
    .timer-bar-track {
      width: 100%; height: 5px; background: var(--border);
      border-radius: 3px; overflow: hidden;
    }
    .timer-bar-fill {
      height: 100%; background: var(--accent); border-radius: 3px;
      transition: width 0.25s linear, background 0.3s; width: 100%;
    }
    .timer-bar-fill.low { background: var(--warm); }
    .timer-bar-fill.critical { background: var(--red); }
    .timer-label {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim);
      margin-top: 3px; display: flex; justify-content: space-between;
    }
    .timer-label span { font-weight: 500; color: var(--text); }

    .label {
      text-align: center;
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim);
      padding: 0px 24px 10px;
    }
    .game-area {
      width: 100%; max-width: 1200px; padding: 12px 24px;
      display: flex; gap: 6px; justify-content: center; flex-shrink: 0;
    }
    .map-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; position: relative;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .map-panel-header {
      padding: 8px 12px; display: flex; justify-content: space-between;
      align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-panel-header h2 {
      font-family: var(--font-mono); font-size: 0.75rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim);
    }
    .badge {
      font-family: var(--font-mono); font-size: 0.7rem;
      padding: 2px 7px; border-radius: 4px;
    }
    .badge-accent { color: var(--accent); background: var(--accent-light); }

    .clue-clip-wrapper {
      width: var(--map-size); height: var(--map-size);
      overflow: hidden; position: relative; flex-shrink: 0;
    }

    /* The pyramid container holds all zoom layers, scaled up 1.5x */
    #pyramid-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      transform: scale(1.3);
      transform-origin: center center;
    }

    /* Each pyramid layer is a full-size Leaflet map, clipped to a circle */
    .pyramid-layer {
      position: absolute;
      width: calc(var(--map-size) * 2.3);
      height: calc(var(--map-size) * 2.3);
      left: 50%;
      top: 50%;
      will-change: transform;
      transform-origin: center center;
      transform: translate(-50%, -50%) scale(1);
    }
    /* Filter applied via JS only for map mode */

    .map-container {
      width: var(--map-size); height: var(--map-size); flex-shrink: 0;
    }

    .guess-panel-wrapper {
      display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
    }
    .controls {
      padding: 8px 0 0;
      display: flex; gap: 12px; justify-content: center; flex-shrink: 0;
    }
    button {
      font-family: var(--font-mono); font-size: 0.82rem; padding: 9px 18px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--surface); color: var(--text); cursor: pointer;
      transition: all 0.15s ease;
    }
    button:hover { background: var(--surface-hover); border-color: var(--accent); }
    button:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--border); }
    button.primary {
      background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500;
    }
    button.primary:hover { filter: brightness(1.08); }
    button.primary:disabled { filter: none; opacity: 0.35; }
    .wrong-feedback {
      font-family: var(--font-mono); font-size: 0.82rem; color: var(--red);
      background: var(--red-light); padding: 5px 12px; border-radius: var(--radius);
      position: absolute; bottom: 12px; right: 12px; z-index: 10;
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    .wrong-feedback.visible {
      opacity: 1; pointer-events: auto;
      animation: fadeSlideIn 0.25s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(44, 53, 39, 0.35); border-radius: var(--radius);
      z-index: 9999; justify-content: center; align-items: center;
    }
    .result-overlay.visible { display: flex; }
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px 40px; text-align: center;
      max-width: 380px; width: 90%; animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .result-card h3 { font-family: var(--font-mono); font-size: 0.95rem; margin-bottom: 6px; color: var(--text-dim); }
    .result-city { font-size: 1.5rem; font-weight: 700; margin-bottom: 14px; color: var(--accent); }
    .result-detail { font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-dim); margin-bottom: 5px; }
    .result-points { font-family: var(--font-mono); font-size: 1.3rem; font-weight: 500; margin-bottom: 20px; }
    .result-points.win  { color: var(--accent); }
    .result-points.lose { color: var(--red); }
    .final-score { font-size: 1.8rem; font-weight: 700; color: var(--accent); margin: 10px 0; }

    /* === LEADERBOARD === */
    .leaderboard-wrapper {
      width: 100%; max-width: 1200px; padding: 0 24px 12px; flex-shrink: 0;
    }
    .leaderboard {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
    }
    .leaderboard h3 {
      font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-dim); margin-bottom: 8px;
    }
    .lb-entries {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .lb-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; gap: 10px;
    }
    .lb-tabs { display: flex; gap: 0; }
    .lb-tab {
      font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 3px 10px; border: 1px solid var(--border); cursor: pointer;
      background: var(--surface); color: var(--text-dim); transition: all 0.15s;
    }
    .lb-tab:first-child { border-radius: 4px 0 0 4px; }
    .lb-tab:last-child { border-radius: 0 4px 4px 0; border-left: none; }
    .lb-tab:hover { color: var(--text); }
    .lb-tab.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
    .lb-tab.active + .lb-tab { border-left-color: var(--accent); }
    .player-name-input {
      font-family: var(--font-mono); font-size: 0.75rem;
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface); color: var(--text); width: 120px;
      outline: none; transition: border-color 0.15s;
    }
    .player-name-input:focus { border-color: var(--accent); }
    .player-name-input::placeholder { color: var(--text-dim); }
    .lb-name-area { display: flex; align-items: center; gap: 6px; }
    .lb-entry {
      font-family: var(--font-mono); font-size: 0.75rem;
      display: flex; align-items: center; gap: 5px;
    }
    .lb-rank { color: var(--text-dim); min-width: 16px; }
    .lb-score { color: var(--accent); font-weight: 500; }
    .lb-diff { color: var(--text-dim); font-size: 0.65rem; }
    .lb-empty { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-dim); }

    .leaflet-container { background: #eef3eb; }
    .satellite-mode .leaflet-container { background: #1a2e1a; }
    .pyramid-layer.map-tiles .leaflet-tile-pane {
    }
    .pyramid-layer .leaflet-tile-pane img {
      image-rendering: high-quality;
    }
    .leaflet-control-attribution {
      background: #cde7b7 !important;
      color: var(--text-dim) !important; font-size: 0.6rem !important;
    }
    .leaflet-control-attribution a { color: var(--text-dim) !important; }

    @media (max-width: 820px) {
      html, body { overflow: auto; }
      .game-area { flex-direction: column; align-items: center; }
      .game-area .guess-panel-wrapper .map-container,
      .clue-clip-wrapper {
        height: calc(var(--map-size) * 0.64);
      }
    }
  </style>
</head>
<body class="satellite-mode">
  <header>
    <h1>guess the city!</h1>
    <div class="header-right">
      <select class="difficulty-select" id="difficulty-select">
        <option value="easy" selected>easy (50 cities)</option>

      </select>
      <button class="mode-toggle satellite" id="mode-toggle" title="Toggle satellite view">🛰️ satellite mode</button>
      <div class="scoreboard">
        round: <span id="round-display">1 / 5</span>
        &middot; score: <span id="score-display">0</span>
      </div>
    </div>
  </header>

  <div class="timer-bar-wrapper">
    <div class="timer-bar-track">
      <div class="timer-bar-fill" id="timer-fill"></div>
    </div>
    <div class="timer-label">
      <span id="timer-text">—</span>
      <span id="zoom-label">zoom 15.0</span>
    </div>
  </div>

  <div class="game-area">
    <div class="map-panel" id="clue-panel" style="overflow:visible">
      <div class="map-panel-header">
        <h2>clue map</h2>
      </div>
      <div class="clue-clip-wrapper" id="clue-clip">
        <div id="pyramid-container"></div>
      </div>
      <div id="wrong-feedback" class="wrong-feedback"></div>
      <div class="result-overlay" id="result-overlay">
        <div class="result-card" id="result-card"></div>
      </div>
    </div>
    <div class="guess-panel-wrapper">
      <div class="map-panel">
        <div class="map-panel-header">
          <h2>your guess</h2>
          <div class="badge badge-accent" id="guess-hint">click to place pin</div>
        </div>
        <div id="answer-map" class="map-container"></div>
      </div>
      <div class="controls">
        <button id="btn-new-game" style="display:none">new game</button>

  </div>

  <div class="leaderboard-wrapper">
    <div class="leaderboard">
      <div class="lb-header">
        <div class="lb-tabs">
          <button class="lb-tab active" data-tab="local">your best</button>
          <button class="lb-tab" data-tab="global">global</button>
        </div>
      </div>
      <div class="lb-entries" id="lb-entries">
        <span class="lb-empty">no games played yet...</span>
      </div>
      <div class="lb-entries" id="lb-global-entries" style="display:none;">
        <span class="lb-empty">loading…</span>
      </div>
    </div>
  </div>

  <div class="label">
    check out my <a href="https://anita.garden" style="color:#559139">website!</a> <br>
    disclaimer: this game is vibe coded 
  </div>


  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* ==========================================================
       CITY DATA — loaded from CSV
       ========================================================== */
    const CITIES_CSV_PATH = "/assets/cityguessing/citiesmanual.csv";
    const DIFFICULTY_SLICES = { easy: 50, medium: 200, hard: 1000 };

    let ALL_CITIES = [];

    const FALLBACK_CITIES = [
      { name: "New York",     country: "USA",       latlng: [40.7128, -74.006] },
      // { name: "Paris",        country: "France",    latlng: [48.8566, 2.3522] },
      // { name: "Tokyo",        country: "Japan",     latlng: [35.6762, 139.6503] },
      // { name: "London",       country: "UK",        latlng: [51.5074, -0.1278] },
      // { name: "Sydney",       country: "Australia", latlng: [-33.8688, 151.2093] },
      // { name: "Rome",         country: "Italy",     latlng: [41.9028, 12.4964] },
      // { name: "Cairo",        country: "Egypt",     latlng: [30.0444, 31.2357] },
      // { name: "Istanbul",     country: "Turkey",    latlng: [41.0082, 28.9784] },
      // { name: "Mumbai",       country: "India",     latlng: [19.076, 72.8777] },
      // { name: "Buenos Aires", country: "Argentina", latlng: [-34.6037, -58.3816] },
    ];

    function parseCitiesCSV(text) {
      const lines = text.trim().split("\n");
      const cities = [];
      const start = (lines[0] && lines[0].toLowerCase().includes("name")) ? 1 : 0;
      for (let i = start; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const parts = [];
        let current = "", inQuotes = false;
        for (const ch of line) {
          if (ch === '"') { inQuotes = !inQuotes; continue; }
          if (ch === ',' && !inQuotes) { parts.push(current.trim()); current = ""; continue; }
          current += ch;
        }
        parts.push(current.trim());
        if (parts.length < 4) continue;
        const [name, country, latStr, lngStr] = parts;
        const lat = parseFloat(latStr);
        const lng = parseFloat(lngStr);
        if (isNaN(lat) || isNaN(lng)) continue;
        cities.push({ name, country, latlng: [lat, lng] });
      }
      return cities;
    }

    async function loadCities() {
      try {
        const res = await fetch(CITIES_CSV_PATH);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const cities = parseCitiesCSV(text);
        if (cities.length < 5) throw new Error(`Only ${cities.length} cities parsed`);
        ALL_CITIES = cities;
        console.log(`Loaded ${cities.length} cities from CSV`);
      } catch (err) {
        console.warn("Failed to load cities CSV, using fallback:", err);
        ALL_CITIES = FALLBACK_CITIES;
      }
    }

    function getCityPool() {
      const diff = document.getElementById("difficulty-select").value;
      const slice = DIFFICULTY_SLICES[diff] || 200;
      return ALL_CITIES.slice(0, Math.min(slice, ALL_CITIES.length));
    }

    const CONFIG = {
      roundsPerGame: 5,
      totalTime: 45,
      startZoom: 15,
      endZoom: 3,
      winRadius: 250,        // base win radius in km (used when zoomed in)
      scaleThresholdKm: 500, // win radius starts growing once the view exceeds this radius
      penalty: 4,
      maxVisibleLayers: 2,
    };

    /* ==========================================================
       VARIABLE SPEED: PIECEWISE TIME → ZOOM MAPPING
       Each phase: zFrac = fraction of zoom range covered (must sum to 1)
                   tFrac = fraction of total time spent (must sum to 1)
       Only CONFIG.totalTime needs to change to rescale everything.
       ========================================================== */
    const PHASE_CONFIG = [
      { zFrac: 0.3, tFrac: 0.20 },
      { zFrac: 0.3, tFrac: 0.28 }, 
      { zFrac: 0.2, tFrac: 0.20 },
      { zFrac: 0.2, tFrac: 0.30 }
    ];

    let _tCursor = 0, _zCursor = 0;
    const PHASES = PHASE_CONFIG.map(p => {
      const phase = {
        zoomStart: _zCursor, zoomEnd: _zCursor + p.zFrac,
        timeStart: _tCursor * CONFIG.totalTime,
        timeEnd: (_tCursor + p.tFrac) * CONFIG.totalTime,
      };
      _tCursor += p.tFrac;
      _zCursor += p.zFrac;
      return phase;
    });

    function elapsedToZoomProgress(elapsed) {
      const t = Math.max(0, Math.min(elapsed, CONFIG.totalTime));
      for (const p of PHASES) {
        if (t <= p.timeEnd) {
          const tFrac = (t - p.timeStart) / (p.timeEnd - p.timeStart);
          return p.zoomStart + tFrac * (p.zoomEnd - p.zoomStart);
        }
      }
      return 1.0;
    }

    function effectiveZoom(elapsed) {
      const progress = elapsedToZoomProgress(elapsed);
      return CONFIG.startZoom - progress * (CONFIG.startZoom - CONFIG.endZoom);
    }

    /* ==========================================================
       TILES — map and satellite modes
       ========================================================== */
    const TILE_SETS = {
      map: {
        clue: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png",
        preload: "https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}.png",
        subdomains: "abcd",
        maxClueZoom: 20,
      },
      satellite: {
        clue: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        preload: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        subdomains: "",
        maxClueZoom: 18,
      },
    };

    // Answer map always uses standard labeled tiles
    const ANSWER_TILE_URL = "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";
    const ANSWER_TILE_ATTR =
      '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> ' +
      '&copy; <a href="https://carto.com/">CARTO</a>';

    let tileMode = "satellite";

    function getTiles() { return TILE_SETS[tileMode]; }

    // Satellite maxes out at 18; cap start zoom accordingly
    function getEffectiveStartZoom() {
      return Math.min(CONFIG.startZoom, getTiles().maxClueZoom);
    }

    const SUBDOMAINS = ["a", "b", "c", "d"];

    /* ==========================================================
       MAP SIZE
       ========================================================== */
    function computeMapSize() {
      const headerH = document.querySelector("header").offsetHeight;
      const timerH = document.querySelector(".timer-bar-wrapper").offsetHeight;
      const controlsH = document.querySelector(".controls").offsetHeight;
      const lbH = document.querySelector(".leaderboard-wrapper").offsetHeight;
      const chrome = headerH + timerH + controlsH + lbH + 50;
      const availH = window.innerHeight - chrome;
      const panelHeaderH = 38;
      const maxFromHeight = availH - panelHeaderH;
      const containerW = Math.min(window.innerWidth, 1200);
      const isStacked = window.innerWidth <= 820;
      const maxW = isStacked ? containerW - 48 : (containerW - 64) / 2;
      const size = Math.max(200, Math.floor(Math.min(maxFromHeight, maxW)));
      document.documentElement.style.setProperty("--map-size", size + "px");
      answerMap.invalidateSize();
      for (const layer of pyramidLayers) layer.map.invalidateSize();
    }

    /* ==========================================================
       STATE
       ========================================================== */
    let state = {
      round: 0, score: 0, currentCity: null, clueLatLng: null, guessLatLng: null,
      citiesThisGame: [], timeRemaining: CONFIG.totalTime,
      roundActive: false, gameOver: false, animFrameId: null,
      animStartTime: null, animTimeOffset: 0, _lastUIUpdate: 0,
    };

    /* ==========================================================
       PYRAMID LAYER SYSTEM
       ========================================================== */
    const pyramidContainer = document.getElementById("pyramid-container");
    let pyramidLayers = [];

    function createPyramidLayer(zoom, latlng) {
      const el = document.createElement("div");
      el.className = "pyramid-layer";
      if (tileMode === "map") el.classList.add("map-tiles");
      el.id = `pyramid-layer-${zoom}`;
      el.style.zIndex = zoom;
      pyramidContainer.appendChild(el);

      const map = L.map(el, {
        zoomControl: false, dragging: false, touchZoom: false,
        doubleClickZoom: false, scrollWheelZoom: false,
        boxZoom: false, keyboard: false,
        fadeAnimation: false, zoomAnimation: false,
        attributionControl: false,
      }).setView(latlng, zoom);

      const tiles = getTiles();
      L.tileLayer(tiles.clue, {
        keepBuffer: 10, updateWhenZooming: false,
        subdomains: tiles.subdomains || "abc",
        maxZoom: tiles.maxClueZoom || 20,
      }).addTo(map);

      // Map mode: brightness/contrast filter
      if (tileMode === "map") {
        const tilePane = el.querySelector(".leaflet-tile-pane");
        if (tilePane) tilePane.style.filter = "brightness(0.85) contrast(1.3)";
      }

      const layer = { zoom, map, el };
      pyramidLayers.push(layer);
      pyramidLayers.sort((a, b) => a.zoom - b.zoom);
      return layer;
    }

    function destroyPyramidLayer(layer) {
      layer.map.remove();
      if (layer.el.parentNode) layer.el.parentNode.removeChild(layer.el);
      pyramidLayers = pyramidLayers.filter(l => l !== layer);
    }

    function clearAllPyramidLayers() {
      for (const layer of [...pyramidLayers]) {
        layer.map.remove();
        if (layer.el.parentNode) layer.el.parentNode.removeChild(layer.el);
      }
      pyramidLayers = [];
    }

    /* ==========================================================
       PYRAMID CLIP & SCALE UPDATE
       ========================================================== */
    function updatePyramidLayers(currentEZ) {
      const startZoom = getEffectiveStartZoom();
      const currentIntZoom = Math.max(CONFIG.endZoom, Math.ceil(currentEZ));

      const desiredZooms = [];
      for (let z = currentIntZoom; z <= Math.min(currentIntZoom + CONFIG.maxVisibleLayers - 1, startZoom); z++) {
        desiredZooms.push(z);
      }

      for (const z of desiredZooms) {
        if (!pyramidLayers.find(l => l.zoom === z)) {
          createPyramidLayer(z, state.clueLatLng || state.currentCity.latlng);
        }
      }

      for (const layer of [...pyramidLayers]) {
        if (!desiredZooms.includes(layer.zoom)) destroyPyramidLayer(layer);
      }

      pyramidLayers.sort((a, b) => a.zoom - b.zoom);
      const numLayers = pyramidLayers.length;

      for (let i = 0; i < numLayers; i++) {
        const layer = pyramidLayers[i];
        const scaleFactor = Math.pow(2, -(layer.zoom - currentEZ));
        layer.el.style.transform = `translate(-50%, -50%) scale(${scaleFactor})`;

        const posFromTop = numLayers - 1 - i;

        if (posFromTop === numLayers - 1) {
          layer.el.style.clipPath = "none";
        } else {
          const fractionalProgress = layer.zoom - currentEZ;
          const baseScreenFrac = 0.35 * (posFromTop + 1);
          const growFactor = 1.0 + fractionalProgress * 0.5;
          const screenFrac = Math.min(1.0, baseScreenFrac * growFactor);
          // Element is 2.3x viewport
          const elementFrac = screenFrac / (2.3 * scaleFactor);
          const clipPct = Math.min(50, elementFrac * 100 + 2);
          layer.el.style.clipPath = `circle(${clipPct}% at 50% 50%)`;
        }
      }
    }

    /* ==========================================================
       TILE PRELOADING
       ========================================================== */
    function latLngToTile(lat, lng, zoom) {
      const n = Math.pow(2, zoom);
      const x = Math.floor(((lng + 180) / 360) * n);
      const latRad = (lat * Math.PI) / 180;
      const y = Math.floor(
        ((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2) * n
      );
      return { x, y };
    }

    let preloadedZooms = new Set();

    function preloadTilesForZoom(lat, lng, zoom) {
      const startZoom = getEffectiveStartZoom();
      if (zoom < CONFIG.endZoom || zoom > startZoom || preloadedZooms.has(zoom)) return;
      preloadedZooms.add(zoom);

      const center = latLngToTile(lat, lng, zoom);
      const mapPx = parseFloat(getComputedStyle(document.documentElement)
        .getPropertyValue("--map-size")) * 2.3 || 1035;
      const tilesAcross = Math.ceil(mapPx / 256);
      const radius = Math.ceil(tilesAcross / 2) + 1;

      const tiles = getTiles();
      for (let dx = -radius; dx <= radius; dx++) {
        for (let dy = -radius; dy <= radius; dy++) {
          const tx = center.x + dx;
          const ty = center.y + dy;
          const s = SUBDOMAINS[((tx % 4) + 4) % 4];
          const url = tiles.preload
            .replace("{s}", s)
            .replace("{z}", zoom)
            .replace("{x}", tx)
            .replace("{y}", ty)
            .replace("{r}", "");
          new Image().src = url;
        }
      }
    }

    /* ==========================================================
       rAF ANIMATION LOOP
       ========================================================== */
    function animationLoop(timestamp) {
      if (!state.roundActive) return;

      if (state.animStartTime === null) state.animStartTime = timestamp;

      const elapsed = (timestamp - state.animStartTime) / 1000 + state.animTimeOffset;
      state.timeRemaining = Math.max(0, CONFIG.totalTime - elapsed);

      if (state.timeRemaining <= 0) {
        state.timeRemaining = 0;
        endRound(false, 0);
        return;
      }

      // Compute effective zoom using the mode-aware start zoom
      const startZoom = getEffectiveStartZoom();
      const zoomRange = startZoom - CONFIG.endZoom;
      const progress = elapsedToZoomProgress(elapsed);
      const ez = startZoom - progress * zoomRange;

      // Preload upcoming zoom levels
      const currentIntZoom = Math.max(CONFIG.endZoom, Math.ceil(ez));
      for (let z = currentIntZoom; z >= Math.max(CONFIG.endZoom, currentIntZoom - 3); z--) {
        const clue = state.clueLatLng || state.currentCity.latlng;
        preloadTilesForZoom(clue[0], clue[1], z);
      }

      updatePyramidLayers(ez);

      // UI at ~4Hz
      if (timestamp - state._lastUIUpdate > 250) {
        state._lastUIUpdate = timestamp;
        const t = state.timeRemaining;
        const pct = (t / CONFIG.totalTime) * 100;
        const fill = document.getElementById("timer-fill");
        fill.style.width = `${pct}%`;
        fill.classList.toggle("low", pct <= 40 && pct > 15);
        fill.classList.toggle("critical", pct <= 15);
        document.getElementById("timer-text").textContent = `${t.toFixed(1)}s`;
        document.getElementById("zoom-label").textContent = `zoom ${ez.toFixed(1)}`;
        if (guessCircle) guessCircle.setRadius(getDynamicWinRadius(ez) * 1000);
      }

      state.animFrameId = requestAnimationFrame(animationLoop);
    }

    function startAnimation() {
      state.animStartTime = null;
      state.animTimeOffset = 0;
      state._lastUIUpdate = 0;
      state.animFrameId = requestAnimationFrame(animationLoop);
    }

    function stopAnimation() {
      if (state.animFrameId) {
        cancelAnimationFrame(state.animFrameId);
        state.animFrameId = null;
      }
    }

    /* ==========================================================
       ANSWER MAP (always standard labeled tiles)
       ========================================================== */
    const answerMap = L.map("answer-map", { zoomControl: true }).setView([20, 0], 2);
    L.tileLayer(ANSWER_TILE_URL, { attribution: ANSWER_TILE_ATTR }).addTo(answerMap);
    L.control.scale({ imperial: false, position: 'bottomleft' }).addTo(answerMap);

    let guessCircle = null;
    const GUESS_CIRCLE_STYLE = {
      color: "#4a8c3f", weight: 2,
      fillColor: "#4a8c3f", fillOpacity: 0.10, dashArray: "6 4",
    };

    answerMap.on("click", function (e) {
      if (!state.roundActive) return;
      state.guessLatLng = e.latlng;
      const ez = effectiveZoom(CONFIG.totalTime - state.timeRemaining);
      const r = getDynamicWinRadius(ez) * 1000;
      if (guessCircle) {
        guessCircle.setLatLng(e.latlng);
        guessCircle.setRadius(r);
      } else {
        guessCircle = L.circle(e.latlng, { ...GUESS_CIRCLE_STYLE, radius: r }).addTo(answerMap);
      }

        `${e.latlng.lat.toFixed(2)}, ${e.latlng.lng.toFixed(2)}`;
    });

    // Hide the circle during player-initiated zoom animations to avoid SVG redraw glitches.
    // endRound sets roundActive=false before fitBounds, so those zooms are left alone.
    answerMap.on('zoomstart', () => {
      if (state.roundActive && guessCircle) {
        answerMap.removeLayer(guessCircle);
        guessCircle = null;
      }
    });
    answerMap.on('zoomend', () => {
      if (state.roundActive && state.guessLatLng) {
        if (guessCircle) { answerMap.removeLayer(guessCircle); guessCircle = null; }
        const ez = effectiveZoom(CONFIG.totalTime - state.timeRemaining);
        guessCircle = L.circle(state.guessLatLng,
          { ...GUESS_CIRCLE_STYLE, radius: getDynamicWinRadius(ez) * 1000 }
        ).addTo(answerMap);
      }
    });

    /* ==========================================================
       UTILITIES
       ========================================================== */
    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = (d) => (d * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function calcPoints(tr) { return Math.max(0, Math.round(tr)); }

    function formatDist(km) {
      if (km < 1) return `${Math.round(km * 1000)} m`;
      if (km < 100) return `${km.toFixed(1)} km`;
      return `${Math.round(km).toLocaleString()} km`;
    }

    // Approximate visible radius in km at a given effective zoom (calibrated for ~450px map).
    // win radius is held at CONFIG.winRadius until the view exceeds scaleThresholdKm,
    // then grows proportionally so the acceptance zone stays a fixed fraction of the view.
    function getDynamicWinRadius(ez) {
      const viewRadiusKm = 35000 / Math.pow(2, ez);
      return Math.max(CONFIG.winRadius, CONFIG.winRadius * viewRadiusKm / CONFIG.scaleThresholdKm);
    }

    function jitterLatLng(latlng, maxRadiusKm = 4) {
      const [lat, lng] = latlng;
      const angle = Math.random() * 2 * Math.PI;
      // sqrt gives uniform area distribution within the circle
      const dist = Math.sqrt(Math.random()) * maxRadiusKm;
      const dlat = (dist * Math.cos(angle)) / 111.32;
      const dlng = (dist * Math.sin(angle)) / (111.32 * Math.cos(lat * Math.PI / 180));
      return [lat + dlat, lng + dlng];
    }

    async function isOverWater(lat, lng) {
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`
        );
        if (!res.ok) return false;
        const data = await res.json();
        // Open ocean: Nominatim returns { error: "Unable to geocode" }
        if (data.error) return true;
        // Named water bodies
        const waterTypes = new Set([
          'ocean', 'sea', 'bay', 'strait', 'gulf', 'lake',
          'river', 'reservoir', 'harbour', 'harbor',
        ]);
        if (waterTypes.has(data.type)) return true;
        if (data.class === 'waterway' || data.class === 'water') return true;
        return false;
      } catch {
        return false; // assume land on error
      }
    }

    async function getJitteredLatLng(city, maxTries = 5) {
      for (let i = 0; i < maxTries; i++) {
        const jittered = jitterLatLng(city.latlng);
        if (!(await isOverWater(jittered[0], jittered[1]))) return jittered;
      }
      console.log("All jitter attempts landed on water, using exact city center");
      return city.latlng;
    }

    // Keep the top N entries per difficulty+mode category.
    function trimByCategory(entries, perCatMax) {
      const byCategory = {};
      for (const e of entries) {
        const key = `${e.difficulty}:${e.mode || "map"}`;
        (byCategory[key] = byCategory[key] || []).push(e);
      }
      const out = [];
      for (const cat of Object.values(byCategory)) {
        cat.sort((a, b) => b.score - a.score);
        out.push(...cat.slice(0, perCatMax));
      }
      return out;

    async function submitToGlobalLeaderboard(score, difficulty, mode, name = getPlayerName()) {

    /* ==========================================================
       GAME FLOW
       ========================================================== */
    function startGame() {
      state.round = 0;
      state.score = 0;
      state.citiesThisGame = shuffle(getCityPool()).slice(0, CONFIG.roundsPerGame);
      updateScoreboard();
      startRound();
    }

    async function startRound() {
      const city = state.citiesThisGame[state.round];
      state.currentCity = city;
      state.clueLatLng = null;
      state.guessLatLng = null;
      state.timeRemaining = CONFIG.totalTime;
      state.roundActive = true;
      preloadedZooms = new Set();

      const startZoom = getEffectiveStartZoom();

      clearAllPyramidLayers();

      // Jitter start position and check for water (up to 5 tries)
      state.clueLatLng = await getJitteredLatLng(city);

      createPyramidLayer(startZoom, state.clueLatLng);

      for (let z = startZoom - 1; z >= Math.max(CONFIG.endZoom, startZoom - 4); z--) {
        preloadTilesForZoom(state.clueLatLng[0], state.clueLatLng[1], z);
      }

      answerMap.setView([20, 0], 2, { animate: false });
      if (guessCircle) { answerMap.removeLayer(guessCircle); guessCircle = null; }

      document.getElementById("btn-submit").disabled = true;
      document.getElementById("guess-hint").textContent = "click to place pin";
      hideWrongFeedback();
      updateTimerUI();
      updateScoreboard();

      setTimeout(() => startAnimation(), 600);
    }

    function submitGuess() {
      if (!state.guessLatLng || !state.roundActive) return;
      const city = state.currentCity;
      const dist = haversineKm(
        state.guessLatLng.lat, state.guessLatLng.lng,
        city.latlng[0], city.latlng[1]
      );
      const ez = effectiveZoom(CONFIG.totalTime - state.timeRemaining);
      const winRadius = getDynamicWinRadius(ez);
      if (dist <= winRadius) {
        stopAnimation();
        const pts = calcPoints(state.timeRemaining);
        state.score += pts;
        endRound(true, pts, dist, winRadius);
      } else {
        state.animTimeOffset += CONFIG.penalty;
        state.timeRemaining = Math.max(0, state.timeRemaining - CONFIG.penalty);
        updateTimerUI();
        showWrongFeedback(dist);
        if (state.timeRemaining <= 0) { stopAnimation(); endRound(false, 0); }
      }
    }

    let _wrongFeedbackTimer = null;
    function showWrongFeedback(dist) {
      if (_wrongFeedbackTimer) { clearTimeout(_wrongFeedbackTimer); _wrongFeedbackTimer = null; }
      const el = document.getElementById("wrong-feedback");
      el.textContent = `✗ ${formatDist(dist)} away · −${CONFIG.penalty}s`;
      el.classList.remove("visible");
      void el.offsetWidth; // restart animation
      el.classList.add("visible");
      _wrongFeedbackTimer = setTimeout(() => {
        el.classList.remove("visible");
        _wrongFeedbackTimer = null;
      }, 3000);
    }
    function hideWrongFeedback() {
      if (_wrongFeedbackTimer) { clearTimeout(_wrongFeedbackTimer); _wrongFeedbackTimer = null; }
      document.getElementById("wrong-feedback").classList.remove("visible");
    }

    function endRound(won, pts, dist, winRadius = CONFIG.winRadius) {
      state.roundActive = false;
      stopAnimation();
      const city = state.currentCity;

      clearAllPyramidLayers();
      const overviewLayer = createPyramidLayer(6, city.latlng);
      overviewLayer.el.style.transform = "translate(-50%, -50%) scale(1)";
      overviewLayer.el.style.clipPath = "none";

      const trueMarker = L.circleMarker(city.latlng, {
        radius: 8, color: "#4a8c3f",
        fillColor: "#4a8c3f", fillOpacity: 0.9, weight: 2,
      }).addTo(answerMap);

      let line = null;
      if (state.guessLatLng) {
        line = L.polyline([state.guessLatLng, city.latlng], {
          color: won ? "#4a8c3f" : "#c0392b", weight: 2, dashArray: "6 4",
        }).addTo(answerMap);
        answerMap.fitBounds(
          L.latLngBounds([state.guessLatLng, city.latlng]),
          { padding: [40, 40] }
        );
      }

      const isLast = state.round + 1 >= CONFIG.roundsPerGame;
      const card = document.getElementById("result-card");

      if (won) {
        card.innerHTML = `
          <h3>the city was</h3>
          <div class="result-city">${city.name}, ${city.country}</div>
          <div class="result-detail">${formatDist(dist)} away — within ${Math.round(winRadius)} km</div>
          <div class="result-detail">${state.timeRemaining.toFixed(1)}s remaining</div>
          <div class="result-points win">+${pts} pts</div>
          <button class="primary" style="width:100%">
            ${isLast ? "see final score" : "next city →"}
          </button>`;
      } else {
        card.innerHTML = `
          <h3>the city was</h3>
          <div class="result-city">${city.name}, ${city.country}</div>
          <div class="result-points lose">+0 pts</div>
          <button class="primary" style="width:100%">
            ${isLast ? "see final score" : "next city →"}
          </button>`;
      }

      document.getElementById("result-overlay").classList.add("visible");
      updateScoreboard();

      const handler = () => {
        document.getElementById("result-overlay").classList.remove("visible");
        answerMap.removeLayer(trueMarker);
        if (line) answerMap.removeLayer(line);
        document.getElementById("result-overlay").removeEventListener("click", handler);
        state.round++;
        if (state.round >= CONFIG.roundsPerGame) showGameOver();
        else startRound();
      };
      setTimeout(() => document.getElementById("result-overlay").addEventListener("click", handler), 300);
    }

    function showGameOver() {
      const diff = document.getElementById("difficulty-select").value;
      addToLeaderboard(state.score, diff, tileMode);
      const maxPossible = CONFIG.totalTime * CONFIG.roundsPerGame;
      const savedName = localStorage.getItem("guessTheCity_playerName") || "";
      const card = document.getElementById("result-card");
      card.innerHTML = `
        <h3>game over</h3>
        <div class="final-score">${state.score} / ${maxPossible}</div>
        <div style="display:flex;gap:6px;margin:16px 0 4px">
          <input type="text" id="score-name-input" class="player-name-input"
            placeholder="your name" maxlength="16" spellcheck="false"
            value="${savedName}" style="flex:1;font-size:0.82rem;padding:6px 8px" />
          <button id="btn-submit-score" onclick="submitScore()">submit score</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button style="flex:1" onclick="dismissGameOver()">close</button>
          <button class="primary" style="flex:1" onclick="dismissAndRestart()">play again</button>
        </div>`;
      state.gameOver = true;
      document.getElementById("result-overlay").classList.add("visible");
    }

    function submitScore() {
      const nameEl = document.getElementById("score-name-input");
      const name = (nameEl && nameEl.value.trim()) || "anonymous";
      localStorage.setItem("guessTheCity_playerName", name);
      const diff = document.getElementById("difficulty-select").value;
      submitToGlobalLeaderboard(state.score, diff, tileMode, name);
      const btn = document.getElementById("btn-submit-score");
      if (btn) { btn.textContent = "submitted!"; btn.disabled = true; }
    }

    function dismissGameOver() {
      document.getElementById("result-overlay").classList.remove("visible");
      state.gameOver = false;
      document.getElementById("btn-new-game").style.display = "";
    }

    function dismissAndRestart() {
      document.getElementById("result-overlay").classList.remove("visible");
      state.gameOver = false;
      startGame();
    }

    function updateScoreboard() {
      document.getElementById("round-display").textContent =
        `${state.round + 1} / ${CONFIG.roundsPerGame}`;
      document.getElementById("score-display").textContent = state.score;
    }

    document.getElementById("btn-submit").addEventListener("click", submitGuess);
    document.getElementById("btn-new-game").addEventListener("click", () => {
      document.getElementById("btn-new-game").style.display = "none";
      startGame();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && state.gameOver) dismissGameOver();
    });
    window.addEventListener("resize", computeMapSize);

    requestAnimationFrame(async () => {
      document.getElementById("timer-text").textContent = `${CONFIG.totalTime.toFixed(1)}s`;
      computeMapSize();
      renderLeaderboard();
      await loadCities();
      startGame();
    });
  </script>
  
</body>
</html>
