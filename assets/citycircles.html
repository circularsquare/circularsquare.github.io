<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#e3ffe0;--surface:#ffffff;--surface2:#e8f1e0;--border:#aacc9f;--border2:#648f5d;--text:#3a411e;--muted:#7f9363;--radius:2px;--fs-lg:16px;--fs-md:13px;--fs-sm:11px}

.slabel{font-size:var(--fs-sm);color:var(--muted);margin-bottom:7px}
.mode-tabs{display:flex;gap:5px}
.mode-tab{flex:1;padding:6px 8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:Georgia,serif;font-size:var(--fs-sm);cursor:pointer;border-radius:var(--radius);transition:all .15s;text-align:center}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

  // python -m http.server 8000
let CITIES=[];
let cityNameMap=new Map();
let _filteredCache=null, _filteredMinPop=-1;

function norm(s){
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}

// Generate alias variants: st<->saint, city optional
function getVariants(n){
  const set=new Set([n]);
  function expand(s){
    if(s.startsWith('saint')) set.add('st'+s.slice(5));
    if(s.startsWith('st')) set.add('saint'+s.slice(2));
    if(s.endsWith('city')) set.add(s.slice(0,-4));
    if(!s.endsWith('city')) set.add(s+'city');
  }
  expand(n);
  [...set].forEach(expand);
  [...set].forEach(expand);
  return set;
}

// Aliases: normalized alias → normalized canonical city name in CITIES_RAW.
// Diacritics and spaces are already stripped by norm(), so only add aliases
// that are genuinely different strings after normalization.
const CITY_ALIASES={
  'bombay':                    'mumbai',
  'bangalore':                 'bengaluru',
  'bengalore':                 'bengaluru',        // misspelling
  'calcutta':                  'kolkata',
  'madras':                    'chennai',
  'poona':                     'pune',
  'amdavad':                   'ahmedabad',
  'peking':                    'beijing',
  'canton':                    'guangzhou',
  'chungking':                 'chongqing',
  'nanking':                   'nanjing',
  'nankin':                    'nanjing',
  'tientsin':                  'tianjin',
  'hangchow':                  'hangzhou',
  'soochow':                   'suzhou',
  'tsingtao':                  'qingdao',
  'mukden':                    'shenyang',
  'amoy':                      'xiamen',
  'fatshan':                   'foshan',
  'saigon':                    'hochiminhcity',
  'ulaanbaatar':               'ulanbator',        // canonical in data is "Ulan Bator"
  'ulaanbataar':               'ulanbator',
  'ulanbaatar':                'ulanbator',
  'ulaanbatar':                'ulanbator',
  'kiev':                      'kyiv',
  'rangoon':                   'yangon',
  'angora':                    'ankara',
  'constantinople':            'istanbul',
  'mecca':                     'makkah',
  'medina':                    'madinah',
  'basra':                    'basrah',
  'jidda':                     'jeddah',
  'jedda':                     'jeddah',
  'jiddah':                    'jeddah',
  'teheran':                   'tehran',
  'leopoldville':              'kinshasa',
  'dacca':                     'dhaka',
  'chittagong':                'chattogram',
  'batavia':                   'jakarta',
  'leningrad':                 'saintpetersburg',
  'petrograd':                 'saintpetersburg',
  'sanktpeterburg':           'saintpetersburg',
  'petropavlovsk':             'petropavlovskkamchatskiy',
  'roma':                      'rome',
  'milano':                    'milan',
  'munchen':                   'munich',
  'wien':                      'vienna',
  'warszawa':                  'warsaw',
  'praha':                     'prague',
  'singapura':                 'singapore',
  'krungthep':                 'bangkok',
  'khartum':                   'khartoum',
  'addisabeba':                'addisababa',
  'alger':                     'algiers',
  'katmandu':                  'kathmandu',
  'kathmando':                 'kathmandu',        // misspelling
  'kaapstad':                  'capetown',
};

function loadCities(){
  CITIES=window.CITIES_RAW.map(c=>({name:c[0],lat:c[1],lng:c[2],pop:c[3],cc:c[4]||'??'}));
  cityNameMap.clear();
  CITIES.forEach((c,i)=>{
    const n=norm(c.name);
    c._norm=n;
    for(const v of getVariants(n)){
      if(!cityNameMap.has(v)) cityNameMap.set(v,[]);
      cityNameMap.get(v).push({c,i});
    }
  });
  // Register aliases — point each alias key at the same entries as its canonical
  for(const [alias,canonical] of Object.entries(CITY_ALIASES)){
    const entries=cityNameMap.get(canonical);
    if(entries&&!cityNameMap.has(alias)) cityNameMap.set(alias,entries);
  }
}


function hav(la1,lo1,la2,lo2){
  const R=6371,r=Math.PI/180,dL=(la2-la1)*r,dG=(lo2-lo1)*r;
  const a=Math.sin(dL/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Population tiers: > threshold
const TIERS=[
  {min:10000000,col:'#c040a0',r:8.5},
  {min:3000000, col:'#d03030',r:7.5},
  {min:1000000, col:'#e07820',r:6.5},
  {min:300000,  col:'#d4c020',r:5.5},
  {min:100000,  col:'#4caf50',r:4.5},
  {min:30000,   col:'#2ab8b8',r:3.5},
  {min:10000,   col:'#4a90d9',r:2.5},
];

function cityStyle(pop){
  for(const t of TIERS) if(pop>=t.min) return t;
  return TIERS[TIERS.length-1];
}

function formatPop(pop){
  if(pop>=1000000) return (pop/1000000).toFixed(1).replace(/\.0$/,'')+'m';
  if(pop>=1000) return Math.round(pop/1000)+'k';
  return pop.toString();
}

// ── State ──
let mode='radius', radKm=500, nearN=20, minPop=50000;
let gameFinished=false;
let revealedSet=new Set();  // player-found, counted in Found
let finishedSet=new Set();  // giveUp-revealed, not counted, have tooltips
let guessCount=0;
let cityMarkers={}; // idx -> {main, clones[]}
// guessCircles: array of {lat, lng, radiusKm} — redrawn on map move
let guessCircles=[];
let guessedSet=new Set(); // indices already used as guess origins
let circleLayerGroup=L.layerGroup();


// ── Map ──
const map=L.map('map',{center:[20,10],zoom:3,minZoom:3,maxZoom:12,worldCopyJump:false,maxBounds:[[-80,-500],[80,500]],maxBoundsViscosity:1.0});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19,keepBuffer:10
}).addTo(map);
circleLayerGroup.addTo(map);
// One Leaflet pane per tier; higher z-index = renders on top.
// TIERS[0] is the largest cities, so it gets the highest z-index (410).
const TIER_PANES=[];
for(let i=0;i<TIERS.length;i++){
  const name='cityTier'+i;
  map.createPane(name);
  map.getPane(name).style.zIndex=410-i;
  TIER_PANES.push(name);
}

// ── Geodesic circle helpers ──
// Returns [lat, lng] of a point distKm away at given bearing from (lat, lng).
// Lat is clamped to ±85 so Mercator doesn't blow up at the poles.
function geodesicPoint(lat, lng, distKm, bearingDeg){
  const R=6371, d=distKm/R, b=bearingDeg*Math.PI/180;
  const φ1=lat*Math.PI/180, λ1=lng*Math.PI/180;
  const sinφ2=Math.sin(φ1)*Math.cos(d)+Math.cos(φ1)*Math.sin(d)*Math.cos(b);
  const φ2=Math.asin(Math.max(-1,Math.min(1,sinφ2)));
  const λ2=λ1+Math.atan2(Math.sin(b)*Math.sin(d)*Math.cos(φ1),Math.cos(d)-Math.sin(φ1)*Math.sin(φ2));
  return [
    Math.max(-85,Math.min(85, φ2*180/Math.PI)),
    ((λ2*180/Math.PI)+540)%360-180
  ];
}

// ── Circle drawing — geodesic polygons, 5 copies spanning ±720° ──
// Longitudes are kept continuous (no [-180,180] snapping) so the polygon
// never self-intersects when crossing the antimeridian.
// For circles that enclose a pole the fill is drawn as 2° latitude strips —
// each strip is a simple trapezoid that never reaches ±85°, so no single
// polygon causes rendering problems.  The outline is drawn as a polyline.
function drawAllCircles(){
  circleLayerGroup.clearLayers();
  const STEPS=144;
  const style={color:'#648f5d',weight:1,fillColor:'#648f5d',fillOpacity:0.13,dashArray:'5 4',interactive:false};
  const outlineStyle={color:'#648f5d',weight:1,dashArray:'5 4',interactive:false};
  const stripStyle={stroke:false,fillColor:'#648f5d',fillOpacity:0.13,interactive:false};
  for(const gc of guessCircles){
    const poleEnclosed=gc.radiusKm>=(90+gc.lat)*111.32||gc.radiusKm>=(90-gc.lat)*111.32;
    // Arc points (used for outline in both cases, and fill in the normal case)
    const pts=[];
    let prevLng=gc.lng;
    for(let i=0;i<=STEPS;i++){
      const [lat,rawLng]=geodesicPoint(gc.lat,gc.lng,gc.radiusKm,i/STEPS*360);
      let lng=rawLng;
      while(lng-prevLng> 180) lng-=360;
      while(prevLng-lng> 180) lng+=360;
      prevLng=lng;
      pts.push([Math.max(-85,Math.min(85,lat)),lng]);
    }
    if(!poleEnclosed){
      for(const offset of [-720,-360,0,360,720])
        L.polygon(pts.map(([lat,lng])=>[lat,lng+offset]),style).addTo(circleLayerGroup);
    } else {
      // Pole-enclosing: draw fill as two half-circle polygons closed along ±84°.
      // East half follows bearings 0→180, west half 360→180.  Each polygon's
      // vertices lie on the actual circle arc (exact geodesic points) plus two
      // closing vertices on the ±84° parallel — no single polygon approaches a pole.
      const clampLat=(gc.radiusKm>=(90+gc.lat)*111.32)?-84:84;
      const H=STEPS/2;
      const halfPolys=[];
      for(const dir of [1,-1]){ // +1 = east, -1 = west
        const hPts=[];
        let prevLng=gc.lng;
        for(let i=0;i<=H;i++){
          const [lat,rawLng]=geodesicPoint(gc.lat,gc.lng,gc.radiusKm,(dir>0?i:STEPS-i)/STEPS*360);
          let lng=rawLng;
          while(lng-prevLng>180) lng-=360;
          while(prevLng-lng>180) lng+=360;
          prevLng=lng;
          hPts.push([Math.max(-84,Math.min(84,lat)),lng]);
        }
        // Close along the parallel back to the starting longitude
        hPts.push([clampLat,hPts[hPts.length-1][1]]);
        hPts.push([clampLat,hPts[0][1]]);
        halfPolys.push(hPts);
      }
      for(const offset of [-720,-360,0,360,720]){
        L.polyline(pts.map(([lat,lng])=>[lat,lng+offset]),outlineStyle).addTo(circleLayerGroup);
        for(const hPts of halfPolys)
          L.polygon(hPts.map(([lat,lng])=>[lat,lng+offset]),stripStyle).addTo(circleLayerGroup);
      }
    }
  }
}

// ── City markers — 5 copies spanning ±720° to cover full map scroll range ──
function zoomScale(){return Math.pow(1.25,map.getZoom()-5);}

function placeMarker(c, idx, withTooltip=false){
  if(cityMarkers[idx]) return;
  const st=cityStyle(c.pop);
  const tierIdx=TIERS.findIndex(t=>c.pop>=t.min);
  const opts={
    radius:st.r*zoomScale(),
    fillColor:st.col,
    color:'rgba(255,255,255,0.75)',
    weight:1,
    fillOpacity: 0.6,
    interactive:withTooltip,
    pane:TIER_PANES[tierIdx<0?TIER_PANES.length-1:tierIdx]
  };
  const main=L.circleMarker([c.lat,c.lng],opts).addTo(map);
  const clones=[];
  for(const off of [-720,-360,360,720]){
    const clone=L.circleMarker([c.lat,c.lng+off],Object.assign({},opts)).addTo(map);
    clones.push(clone);
  }
  if(withTooltip){
    const addTip=m=>{
      m.on('mouseover',e=>showCityTip(c,e.target.getLatLng()));
      m.on('mouseout',hideCityTip);
    };
    addTip(main);
    clones.forEach(addTip);
  }
  cityMarkers[idx]={main,clones};
}

// ── Single shared tooltip for finished cities ──
let _sharedTip=null;
function showCityTip(c,latlng){
  if(!_sharedTip) _sharedTip=L.tooltip({className:'city-tip'});
  _sharedTip.setContent(`${c.name} · ${formatPop(c.pop)}`);
  _sharedTip.setLatLng(latlng);
  if(!map.hasLayer(_sharedTip)) _sharedTip.addTo(map);
}
function hideCityTip(){
  if(_sharedTip&&map.hasLayer(_sharedTip)) map.removeLayer(_sharedTip);
}

// Viewport-based grid decimation: 100×100 cells, top 2 cities by pop per cell.
// Called after each guess and debounced on map pan/zoom.
let _renderTimer=null;
function scheduleRender(){
  clearTimeout(_renderTimer);
  _renderTimer=setTimeout(updateRenderedMarkers,150);
}

function updateRenderedMarkers(){
  const bounds=map.getBounds();
  const vS=bounds.getSouth(), vN=bounds.getNorth();
  const vW=bounds.getWest(), vE=bounds.getEast();
  const latSpan=Math.max(vN-vS,0.001);
  const lngSpan=Math.max(vE-vW,0.001);
  const GRID=100;
  // Cell size is derived from the viewport (scales with zoom) but anchored to world
  // coordinates so panning doesn't shift which cell a city falls in.
  // Use Mercator Y for rows: the projected Y-span is constant for a given zoom
  // regardless of latitude, so cellY stays stable during north/south panning.
  function mercY(lat){const r=lat*Math.PI/180;return Math.log(Math.tan(Math.PI/4+r/2));}
  const yS=mercY(Math.max(-85,vS)), yN=mercY(Math.min(85,vN));
  const cellY=Math.max(yN-yS,1e-6)/GRID;
  const cellLng=lngSpan/GRID;

  // Bin all revealed+finished cities visible in viewport
  const grid=new Map(); // cellKey -> [idx, ...]
  function bin(idx){
    const c=CITIES[idx];
    if(c.lat<vS||c.lat>vN) return;
    // Shift lng into [vW, vW+360) to handle world-wrap copies
    let lng=c.lng;
    while(lng<vW) lng+=360;
    while(lng-360>=vW) lng-=360;
    if(lng>vE) return;
    const col=Math.floor(lng/cellLng);
    const row=Math.floor(mercY(c.lat)/cellY);
    const key=`${row},${col}`;
    if(!grid.has(key)) grid.set(key,[]);
    grid.get(key).push(idx);
  }
  for(const i of revealedSet) bin(i);
  for(const i of finishedSet) bin(i);

  // Select top 4 per cell by population
  const cullAmount = 4;
  const toShow=new Set();
  for(const [,idxs] of grid){
    idxs.sort((a,b)=>CITIES[b].pop-CITIES[a].pop);
    idxs.slice(0,cullAmount).forEach(i=>toShow.add(i));
  }

  // Add newly visible markers
  for(const idx of toShow){
    if(!cityMarkers[idx]) placeMarker(CITIES[idx],idx,gameFinished&&(revealedSet.has(idx)||finishedSet.has(idx)));
  }
  // Remove markers that scrolled out of selection
  for(const k of Object.keys(cityMarkers)){
    const idx=+k;
    if(!toShow.has(idx)) removeMarker(idx);
  }
  // Resize all visible markers to current zoom (catches survivors that weren't recreated)
  const scale=zoomScale();
  for(const k of Object.keys(cityMarkers)){
    const r=cityStyle(CITIES[+k].pop).r*scale;
    const m=cityMarkers[+k];
    m.main.setRadius(r);
    m.clones.forEach(c=>c.setRadius(r));
  }
}

function removeMarker(idx){
  const m=cityMarkers[idx];
  if(!m)return;
  map.removeLayer(m.main);
  m.clones.forEach(c=>map.removeLayer(c));
  delete cityMarkers[idx];
}

// ── Game helpers ──
function filteredIndices(){
  if(_filteredMinPop===minPop && _filteredCache) return _filteredCache;
  _filteredCache=CITIES.map((c,i)=>({c,i})).filter(({c})=>c.pop>=minPop);
  _filteredMinPop=minPop;
  return _filteredCache;
}
function totalCities(){return filteredIndices().length;}

function formatPopLarge(n){
  if(n>=1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'')+'b';
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'m';
  if(n>=1e3) return Math.round(n/1e3)+'k';
  return n.toString();
}
function upStats(){
  document.getElementById('stat-cities').textContent=revealedSet.size+'/'+totalCities();
  let pop=0; for(const i of revealedSet) pop+=CITIES[i].pop;
  document.getElementById('stat-pop').textContent=revealedSet.size?formatPopLarge(pop):'—';
}

function revealCity(idx){
  if(revealedSet.has(idx)||finishedSet.has(idx))return false;
  revealedSet.add(idx);
  return true;
}

function findCityByName(input){
  const n=norm(input);
  for(const v of getVariants(n)){
    const r=cityNameMap.get(v);
    if(r&&r.length) return r;
  }
  return null;
}

function countryName(cc){ return COUNTRY_NAMES[cc]||cc; }

function updateCountryList(){
  // Build country stats from revealedSet
  const fi=filteredIndices();
  // total per country (filtered)
  const totals={};
  for(const {c} of fi){
    totals[c.cc]=(totals[c.cc]||0)+1;
  }
  // found per country
  const found={};
  for(const {c,i} of fi){
    if(revealedSet.has(i)) found[c.cc]=(found[c.cc]||0)+1;
  }
  // Split into incomplete and complete
  const allCountries=Object.keys(totals);
  const incomplete=allCountries.filter(cc=>(found[cc]||0)<(totals[cc]||1));
  const complete=allCountries.filter(cc=>(found[cc]||0)>=(totals[cc]||1)&&found[cc]);
  // Show all countries (including 0-found) when <10 incomplete remain, otherwise only found ones
  const showAll=incomplete.length<10;
  const active=showAll?allCountries:Object.keys(found);
  if(!showAll&&active.length===0){
    document.getElementById('found-list').innerHTML='';
    return;
  }
  // Sort incomplete by found desc, complete by size; filter to active set
  const incShow=incomplete.filter(cc=>showAll||(found[cc]||0)>0);
  incShow.sort((a,b)=>(found[b]||0)-(found[a]||0));
  complete.sort((a,b)=>totals[b]-totals[a]);
  const ordered=[...incShow,...complete];
  const el=document.getElementById('found-list');
  el.innerHTML='';
  for(const cc of ordered){
    const f=found[cc]||0;
    const t=totals[cc]||0;
    const done=f>=t;
    const row=document.createElement('div');
    row.className='found-item'+(done?' done':'');
    row.innerHTML=`<span class="found-city">${countryName(cc)}</span><span class="found-pop">${f}/${t}</span>`;
    el.appendChild(row);
  }
}

function processGuessOrigin(idx){
  const seed=CITIES[idx];
  revealCity(idx);
  const drawCircle=!guessedSet.has(idx);
  guessedSet.add(idx);
  if(mode==='radius'){
    const latDeg=radKm/111;
    const lngDeg=radKm/(111*Math.cos(seed.lat*Math.PI/180)||0.001);
    if(drawCircle){
      guessCircles.push({lat:seed.lat,lng:seed.lng,radiusKm:radKm});
      drawAllCircles();
    }
    const fi=filteredIndices();
    for(const {c,i} of fi){
      const dlat=Math.abs(c.lat-seed.lat);
      const dlng=Math.min(Math.abs(c.lng-seed.lng),360-Math.abs(c.lng-seed.lng));
      if(dlat>latDeg+1||dlng>lngDeg+1) continue;
      const d=Math.min(hav(seed.lat,seed.lng,c.lat,c.lng),
                       hav(seed.lat,seed.lng+360,c.lat,c.lng),
                       hav(seed.lat,seed.lng-360,c.lat,c.lng));
      if(d<=radKm) revealCity(i);
    }
  } else {
    const fi=filteredIndices();
    const withDist=fi.map(({c,i})=>({c,i,d:Math.min(
      hav(seed.lat,seed.lng,c.lat,c.lng),
      hav(seed.lat,seed.lng+360,c.lat,c.lng),
      hav(seed.lat,seed.lng-360,c.lat,c.lng)
    )})).sort((a,b)=>a.d-b.d);
    const slice=withDist.slice(0,nearN);
    const farthestDist=slice.length>0?slice[slice.length-1].d:radKm;
    if(drawCircle){
      guessCircles.push({lat:seed.lat,lng:seed.lng,radiusKm:farthestDist});
      drawAllCircles();
    }
    for(const {i} of slice) revealCity(i);
  }
}

function onGuess(raw){
  const results=findCityByName(raw);
  if(!results) return false;
  const fiSet=new Set(filteredIndices().map(x=>x.i));
  const valid=results.filter(r=>fiSet.has(r.i));
  if(!valid.length) return false;
  if(valid.every(r=>guessedSet.has(r.i))) return false;
  guessCount++;
  if(guessCount===1) lockControls();
  for(const {i} of valid) processGuessOrigin(i);
  updateRenderedMarkers();
  updateCountryList();
  upStats();
  if(revealedSet.size>=totalCities()) setTimeout(showWin,500);
  return true;
}

// ── Game control ──
function newGame(){
  document.getElementById('win-overlay').classList.remove('show');
  gameFinished=false;
  revealedSet.clear();
  finishedSet.clear();
  guessCount=0;
  guessCircles=[];
  guessedSet=new Set();
  unlockControls();
  Object.keys(cityMarkers).forEach(k=>removeMarker(+k));
  circleLayerGroup.clearLayers();
  document.getElementById('found-list').innerHTML='';
  const inp=document.getElementById('city-input');
  inp.value='';
  inp.disabled=false;
  inp.placeholder='type a city name, press enter\u2026';
  upStats();
  map.setView([20,10],3,{animate:true});
}

function giveUp(){
  gameFinished=true;
  for(const {i} of filteredIndices()){
    if(!revealedSet.has(i)) finishedSet.add(i);
  }
  // Clear all markers so they get re-placed with tooltips enabled
  Object.keys(cityMarkers).forEach(k=>removeMarker(+k));
  updateRenderedMarkers();
  const inp=document.getElementById('city-input');
  inp.disabled=true;
  inp.placeholder='';
  setTimeout(()=>showFinishOverlay(false),300);
}

function showWin(){
  giveUp();
}


// ── Config ──
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  document.getElementById('radius-row').style.display=m==='radius'?'flex':'none';
  document.getElementById('nearest-row').style.display=m==='nearest'?'flex':'none';
  newGame();
}
function lockControls(){
  document.getElementById('radius-select').disabled=true;
  document.getElementById('nearest-select').disabled=true;
  document.getElementById('pop-select').disabled=true;
  document.getElementById('mode-tabs-wrap').style.pointerEvents='none';
  document.getElementById('mode-tabs-wrap').style.opacity='0.45';
}
function unlockControls(){
  document.getElementById('radius-select').disabled=false;
  document.getElementById('nearest-select').disabled=false;
  document.getElementById('pop-select').disabled=false;
  document.getElementById('mode-tabs-wrap').style.pointerEvents='';
  document.getElementById('mode-tabs-wrap').style.opacity='';
}
function onRadiusChange(){
  if(guessCount>0)return;
  radKm=+document.getElementById('radius-select').value;
}
function onNearestChange(){
  if(guessCount>0)return;
  nearN=+document.getElementById('nearest-select').value;
}
function onPopChange(){
  minPop=+document.getElementById('pop-select').value;
  _filteredCache=null;
  newGame();
}

// ── Input ──
document.getElementById('city-input').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const v=e.target.value.trim();
  if(!v)return;
  if(onGuess(v)){
    e.target.value='';
  } else {
    const inp=e.target;
    inp.classList.add('shake');
    inp.addEventListener('animationend',()=>inp.classList.remove('shake'),{once:true});
  }
});

document.addEventListener('keydown',e=>{
  const inp=document.getElementById('city-input');
  if(inp.disabled||document.activeElement===inp) return;
  if(e.ctrlKey||e.altKey||e.metaKey) return;
  if(e.key==='Tab'){e.preventDefault();inp.focus();return;}
  if(e.key.length===1) inp.focus();
});

map.on('moveend',scheduleRender);
map.on('zoomstart',()=>clearTimeout(_renderTimer));
map.on('zoomend',()=>{
  clearTimeout(_renderTimer);
  updateRenderedMarkers();
});

const JSONBIN_KEY='$2a$10$wgxuqXN86298YHAQDZ/lGOSPnrRiqnHmqgF2FAiq9hkubkmGG/7Ae';
const JSONBIN_ID='69b70188c3097a1dd529cead'; 
function lbKey(){
  return mode==='radius'?`radius_${radKm}_${minPop}`:`nearest_${nearN}_${minPop}`;
}

function lbLabel(){
  const pop=minPop>=1e6?(minPop/1e6)+'m+':minPop>=1e3?(minPop/1e3)+'k+':minPop+'+';
  if(mode==='radius') return `radius · ${radKm} km · pop ${pop}`;
  return `nearest ${nearN} · pop ${pop}`;
}

async function lbFetch(){
  if(!JSONBIN_KEY||!JSONBIN_ID) return {};
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':false}});
    if(!r.ok) return {};
    return await r.json()||{};
  }catch(e){return {};}
}

async function lbSubmit(name,found,total){
  if(!JSONBIN_KEY||!JSONBIN_ID) return null;
  const all=await lbFetch();
  const key=lbKey();
  const list=(all[key]||[]).slice();
  list.push({name,found,total,date:new Date().toISOString().slice(0,10)});
  list.sort((a,b)=>b.found-a.found);
  all[key]=list.slice(0,10);
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:JSON.stringify(all)
    });
  }catch(e){}
  return all[key];
}

function lbRenderTable(entries,highlightName){
  if(!entries||!entries.length) return '<div class="lb-empty">no scores yet</div>';
  let html='<table class="lb-table"><tbody>';
  let highlightDone=false;
  entries.forEach((e,i)=>{
    const you=!highlightDone&&highlightName&&e.name===highlightName;
    if(you) highlightDone=true;
    const score=e.total?`${e.found}/${e.total}`:e.found;
    html+=`<tr${you?' class="lb-you"':''}><td>${i+1}</td><td>${e.name}</td><td class="r">${score}</td></tr>`;
  });
  html+='</tbody></table>';
  return html;
}

async function winSubmitScore(){
  const name=document.getElementById('win-name-input').value.trim();
  if(!name) return;
  const btn=document.getElementById('win-submit-btn');
  const status=document.getElementById('win-submit-status');
  btn.disabled=true;
  status.textContent='submitting…';
  const list=await lbSubmit(name,revealedSet.size,totalCities());
  if(list){
    status.textContent='submitted!';
    document.getElementById('win-lb-entries').innerHTML=lbRenderTable(list,name);
  } else {
    status.textContent='jsonbin not configured — fill in JSONBIN_KEY and JSONBIN_ID';
  }
}


function showFinishOverlay(won){
  const total=totalCities();
  document.getElementById('win-found').textContent=`${revealedSet.size}/${total}`;
  document.getElementById('win-sub').textContent='cities found';
  document.getElementById('win-desc').textContent=`${guessCount} guess${guessCount!==1?'es':''}`;
  document.getElementById('win-overlay').classList.add('show');
  document.getElementById('win-submit-status').textContent='';

  // keep name from previous submission
  const entries=document.getElementById('win-lb-entries');
  entries.innerHTML='<div class="lb-empty">loading…</div>';
  (async()=>{
    const all=await lbFetch();
    entries.innerHTML=lbRenderTable(all[lbKey()]||[],null);
  })();
}
