<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/main.css?v={{ site.time | date: '%s' }}">

  {%- include head.html -%}
  <body class="staticmap-body">

    {%- include header.html -%}

    <main class="page-content staticmap-main" aria-label="Content">
      <div class="staticmap-viewport" id="staticmap-viewport">
        <div class="staticmap-scene" id="staticmap-scene">
          <img class="staticmap-image" src="{{ page.image }}" alt="{{ page.title | escape }}">
        </div>
      </div>
    </main>

    {%- include footer.html -%}

    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <script>
      (function() {
        var scene = document.getElementById('staticmap-scene');
        var viewport = document.getElementById('staticmap-viewport');
        var originalImg = scene.querySelector('.staticmap-image');
        var canvasEl = null;
        // `img` always points to whichever element is currently visible
        // (canvas at downscale, original img at upscale, for pixelart maps).
        var img = originalImg;

        {% if page.pixelart %}
        // Pixel-art source: create a 2× NN-upscaled canvas as a sibling of the
        // original <img>. At downscale we show the canvas (gives a "chunky but
        // softly downsampled" pixel-art look), at upscale we show the original
        // img (single-pass smooth interpolation, less blurry than canvas+browser
        // double smoothing).
        var UPSCALE = 2;
        function createUpscaledCanvas() {
          if (!originalImg.naturalWidth) return;
          canvasEl = document.createElement('canvas');
          canvasEl.width = originalImg.naturalWidth * UPSCALE;
          canvasEl.height = originalImg.naturalHeight * UPSCALE;
          canvasEl.className = originalImg.className;
          var ariaLabel = originalImg.getAttribute('alt');
          if (ariaLabel) canvasEl.setAttribute('aria-label', ariaLabel);
          var ctx = canvasEl.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(originalImg, 0, 0, canvasEl.width, canvasEl.height);
          scene.appendChild(canvasEl);
          // Hide the original img by default — updateRendering will toggle as zoom changes.
          originalImg.style.display = 'none';
          img = canvasEl;
        }
        {% endif %}

        // Size the element to "cover" the viewport (fills the shorter axis,
        // overflows the longer one). CSS object-fit: cover crops at the
        // image's display level, so the cropped pixels aren't in the rendered
        // DOM and pan can't reveal them. Setting explicit width/height/left/top
        // makes the overflow real, so the viewport's overflow: hidden clips it
        // and pan unclips it.
        function fitElement(el) {
          if (!el) return;
          var vw = viewport.clientWidth;
          var vh = viewport.clientHeight;
          var iw = el.naturalWidth || el.width;
          var ih = el.naturalHeight || el.height;
          if (!iw || !ih || !vw || !vh) return;
          var coverScale = Math.max(vw / iw, vh / ih);
          var w = iw * coverScale;
          var h = ih * coverScale;
          el.style.width = w + 'px';
          el.style.height = h + 'px';
          el.style.left = ((vw - w) / 2) + 'px';
          el.style.top = ((vh - h) / 2) + 'px';
        }
        function fitCover() {
          fitElement(originalImg);
          fitElement(canvasEl);
        }

        var instance = panzoom(scene, {
          maxZoom: 30,
          minZoom: 0.5,
          smoothScroll: false,
          beforeWheel: function(e) {
            e.preventDefault();
            return false;
          }
        });

        function onImageReady() {
          {% if page.pixelart %}
          createUpscaledCanvas();
          {% endif %}
          fitCover();
          updateRendering();
        }
        if (originalImg.complete && originalImg.naturalWidth) onImageReady();
        else originalImg.addEventListener('load', onImageReady);
        window.addEventListener('resize', fitCover);

        // Toggle which element is visible based on source-pixel-to-device-pixel
        // ratio. At downscale (ratio < 1) the NN canvas + browser downsampling
        // gives the soft-block pixel-art look. At upscale (ratio >= 1) we switch
        // to the original img so the browser does a single smooth interpolation
        // pass instead of smoothing the already-blocky canvas.
        var currentMode = null;
        function updateRendering() {
          if (!canvasEl) return;
          var t = instance.getTransform();
          var sourceW = originalImg.naturalWidth;
          var displayW = img.clientWidth || originalImg.clientWidth;
          if (!sourceW || !displayW) return;
          var dpr = window.devicePixelRatio || 1;
          var ratio = (displayW * t.scale * dpr) / sourceW;
          var mode = ratio >= 1 ? 'canvas' : 'img';
          if (mode === currentMode) return;
          if (mode === 'img') {
            originalImg.style.display = '';
            canvasEl.style.display = 'none';
            img = originalImg;
          } else {
            canvasEl.style.display = '';
            originalImg.style.display = 'none';
            img = canvasEl;
          }
          currentMode = mode;
        }
        instance.on('transform', updateRendering);

        // Loose clamp: after the user releases a drag (or wheel-zoom finishes),
        // make sure at least minVis pixels of the image stay inside the viewport
        // on each axis. minVis shrinks as zoom increases — at high zoom you only
        // need a tiny sliver to anchor, otherwise it'd prevent zooming in on
        // edges (the corner can't be brought near the center of a narrow viewport).
        function clampIntoView() {
          var vpRect = viewport.getBoundingClientRect();
          var imRect = img.getBoundingClientRect();
          var t = instance.getTransform();
          var minVis = Math.max(40, 250 / t.scale);
          var dx = 0, dy = 0;
          if (imRect.right < vpRect.left + minVis) {
            dx = (vpRect.left + minVis) - imRect.right;
          } else if (imRect.left > vpRect.right - minVis) {
            dx = (vpRect.right - minVis) - imRect.left;
          }
          if (imRect.bottom < vpRect.top + minVis) {
            dy = (vpRect.top + minVis) - imRect.bottom;
          } else if (imRect.top > vpRect.bottom - minVis) {
            dy = (vpRect.bottom - minVis) - imRect.top;
          }
          if (dx !== 0 || dy !== 0) {
            instance.smoothMoveTo(t.x + dx, t.y + dy);
          }
        }

        instance.on('panend', clampIntoView);
        instance.on('zoomend', clampIntoView);
      })();
    </script>
  </body>

</html>
