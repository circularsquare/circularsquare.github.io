<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
<link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/main.css?v={{ site.time | date: '%s' }}">

  {%- include head.html -%}
  <body class="staticmap-body">

    {%- include header.html -%}

    <main class="page-content staticmap-main" aria-label="Content">
      <div class="staticmap-viewport" id="staticmap-viewport">
        <div class="staticmap-scene" id="staticmap-scene">
          <img class="staticmap-image" src="{{ page.image }}" alt="{{ page.title | escape }}">
        </div>
      </div>
    </main>

    {%- include footer.html -%}

    <script src="https://unpkg.com/panzoom@9.4.0/dist/panzoom.min.js"></script>
    <script>
      (function() {
        var scene = document.getElementById('staticmap-scene');
        var viewport = document.getElementById('staticmap-viewport');
        var img = scene.querySelector('.staticmap-image');

        // Size the element to "cover" the viewport (fills the shorter axis,
        // overflows the longer one). CSS object-fit: cover crops at the
        // image's display level, so the cropped pixels aren't in the rendered
        // DOM and pan can't reveal them. Setting explicit width/height/left/top
        // makes the overflow real, so the viewport's overflow: hidden clips it
        // and pan unclips it.
        // Cached cover-fit geometry (viewport CSS px). Lets us place the map from
        // the pan/zoom transform alone — no per-frame layout reads, and no need for
        // the <img> to stay in the DOM (we drop it after uploading the texture).
        var natW = 0, natH = 0;
        var fit = { w: 0, h: 0, left: 0, top: 0, vw: 0, vh: 0 };

        function applyFit(el) {
          el.style.width = fit.w + 'px';
          el.style.height = fit.h + 'px';
          el.style.left = fit.left + 'px';
          el.style.top = fit.top + 'px';
        }
        // Size to "cover" the viewport (fills the shorter axis, overflows the
        // longer). Explicit width/height/left/top make the overflow real, so the
        // viewport's overflow:hidden clips it and pan unclips it.
        function fitCover() {
          var vw = viewport.clientWidth, vh = viewport.clientHeight;
          var iw = natW || (img && (img.naturalWidth || img.width));
          var ih = natH || (img && (img.naturalHeight || img.height));
          if (!iw || !ih || !vw || !vh) return;
          var coverScale = Math.max(vw / iw, vh / ih);
          fit.w = iw * coverScale;
          fit.h = ih * coverScale;
          fit.left = (vw - fit.w) / 2;
          fit.top = (vh - fit.h) / 2;
          fit.vw = vw; fit.vh = vh;
          if (img) applyFit(img);
          if (typeof fallbackImg !== 'undefined' && fallbackImg) applyFit(fallbackImg);
        }
        // The map's on-screen rect (viewport-relative CSS px) under the current
        // transform: a scene-local point p maps to scale*p + translate.
        function imgScreenRect() {
          var t = instance.getTransform();
          return {
            left: t.x + t.scale * fit.left,
            top: t.y + t.scale * fit.top,
            width: t.scale * fit.w,
            height: t.scale * fit.h
          };
        }

        var instance = panzoom(scene, {
          maxZoom: 30,
          minZoom: 0.5,
          smoothScroll: false,
          beforeWheel: function(e) {
            e.preventDefault();
            return false;
          }
        });

        function onImageReady() {
          if (img) { natW = img.naturalWidth; natH = img.naturalHeight; }
          fitCover();
          {% if page.pixelart %}
          setupRenderer();
          render();
          {% endif %}
        }
        window.addEventListener('resize', function() {
          fitCover();
          {% if page.pixelart %}render();{% endif %}
        });

        {% if page.pixelart %}
        // ===== Sharp-bilinear WebGL2 renderer =====
        // Renders the map through a fragment shader that keeps each source pixel's
        // interior a flat color and smooths only a ~1px seam at texel borders
        // ("sharp bilinear", the emulator-standard pixel-art filter). The source is
        // sampled at draw time from a single GPU texture at its native resolution —
        // no upscaled bitmap is ever materialized, so memory is ~one decode
        // regardless of zoom, and there's no threshold swap to stall on.
        //
        // When magnifying we apply the sharp remap; when minifying we fall through
        // to plain trilinear (mipmapped) sampling so the zoomed-out view doesn't
        // alias. Falls back to the plain <img> (smooth scaling) if WebGL2 is
        // unavailable or the image exceeds the GPU's max texture size. (Splitting
        // the largest maps across several textures for low-cap phones is a TODO.)
        var gl = null, glCanvas = null, vao = null, quadBuf = null, glReady = false;

        // Sharpness knob: the look of NN-upscaling the source by this factor and
        // then smoothly resampling. 1.0 = plain bilinear (softest), 2.0 = the old
        // 2x-canvas equivalent, large = pure nearest (hard pixels). Tune to taste.
        var PIXEL_SCALE = 2.0;

        var VERT_SRC = `#version 300 es
in vec2 aPos;
in vec2 aUv;
out vec2 vUv;
void main(){ vUv = aUv; gl_Position = vec4(aPos, 0.0, 1.0); }`;

        // Parametric sharp filter. Each source texel keeps a flat center of
        // half-width uRegion and blends over the remaining edge, so transitions
        // span a fixed (2*(0.5-uRegion)) fraction of a source texel regardless of
        // zoom -- exactly reproducing "NN-upscale then smooth". uRegion = 0 is
        // plain bilinear, -> 0.5 is nearest-neighbor. We only remap when magnifying;
        // when minifying we pass the plain coord so mipmaps/textureGrad anti-alias
        // the zoomed-out view.
        var FRAG_SRC = `#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform vec2 uTexSize;
uniform float uRegion;
in vec2 vUv;
out vec4 outColor;
void main(){
  vec2 texel = vUv * uTexSize;
  vec2 dx = dFdx(texel);
  vec2 dy = dFdy(texel);
  vec2 dudv = abs(dx) + abs(dy);
  vec2 tf = floor(texel);
  vec2 cd = (texel - tf) - 0.5;
  vec2 excess = max(abs(cd) - uRegion, 0.0);
  vec2 ramp = excess / max(0.5 - uRegion, 1e-5);
  vec2 f = 0.5 + sign(cd) * 0.5 * ramp;
  vec2 sharpTexel = tf + f;
  vec2 finalTexel = mix(sharpTexel, texel, step(1.0, dudv));
  outColor = textureGrad(uTex, finalTexel / uTexSize, dx / uTexSize, dy / uTexSize);
}`;

        function compileShader(type, src) {
          var s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
            console.warn('[staticmap] shader compile failed:', gl.getShaderInfoLog(s));
            return null;
          }
          return s;
        }

        // (Re)create all GL objects on the current context: program, quad buffer,
        // and the source texture (uploaded from srcImg). Split out from
        // setupRenderer so it can run again after the GPU context is lost and
        // restored. Returns true on success.
        function buildGLResources(srcImg) {
          var vs = compileShader(gl.VERTEX_SHADER, VERT_SRC);
          var fs = compileShader(gl.FRAGMENT_SHADER, FRAG_SRC);
          if (!vs || !fs) return false;
          var prog = gl.createProgram();
          gl.attachShader(prog, vs);
          gl.attachShader(prog, fs);
          gl.linkProgram(prog);
          if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
            console.warn('[staticmap] program link failed:', gl.getProgramInfoLog(prog));
            return false;
          }
          gl.useProgram(prog);
          gl.uniform2f(gl.getUniformLocation(prog, 'uTexSize'), natW, natH);
          gl.uniform1f(gl.getUniformLocation(prog, 'uRegion'), 0.5 - 0.5 / PIXEL_SCALE);

          // Interleaved quad buffer: [clipX, clipY, u, v] x 6 verts, refilled each frame.
          quadBuf = gl.createBuffer();
          vao = gl.createVertexArray();
          gl.bindVertexArray(vao);
          gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
          var posLoc = gl.getAttribLocation(prog, 'aPos');
          var uvLoc = gl.getAttribLocation(prog, 'aUv');
          gl.enableVertexAttribArray(posLoc);
          gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 16, 0);
          gl.enableVertexAttribArray(uvLoc);
          gl.vertexAttribPointer(uvLoc, 2, gl.FLOAT, false, 16, 8);

          var tex = gl.createTexture();
          gl.bindTexture(gl.TEXTURE_2D, tex);
          // No UNPACK_FLIP_Y: texture row 0 = image top, and the quad maps v=0 to
          // its top edge, so the two already agree. Flipping here inverts the map.
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, gl.RGBA, gl.UNSIGNED_BYTE, srcImg);
          gl.generateMipmap(gl.TEXTURE_2D);                                  // WebGL2 allows NPOT mipmaps
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          gl.clearColor(0, 0, 0, 0);
          return true;
        }

        // Original source + alt, kept so we can reload pixels for the context-loss
        // fallback and to rebuild the texture after a restore (the decoded <img> is
        // dropped after upload). fallbackImg is the soft <img> shown while the GPU
        // context is gone.
        var imgSrc = img ? img.getAttribute('src') : null;
        var imgAlt = img ? img.getAttribute('alt') : null;
        var fallbackImg = null;

        function showFallbackImg() {
          if (!fallbackImg) {
            fallbackImg = document.createElement('img');
            fallbackImg.className = 'staticmap-image';
            if (imgAlt) fallbackImg.alt = imgAlt;
            fallbackImg.addEventListener('load', function() { applyFit(fallbackImg); });
            fallbackImg.src = imgSrc;
            scene.appendChild(fallbackImg);   // in the scene, so panzoom still drives it
            if (fallbackImg.complete && fallbackImg.naturalWidth) applyFit(fallbackImg);
          }
          fallbackImg.style.visibility = '';
        }
        function removeFallbackImg() {
          if (fallbackImg) {
            if (fallbackImg.parentNode) fallbackImg.parentNode.removeChild(fallbackImg);
            fallbackImg = null;   // drop its decode again
          }
        }

        function setupRenderer() {
          glCanvas = document.createElement('canvas');
          glCanvas.style.position = 'absolute';
          glCanvas.style.inset = '0';
          glCanvas.style.pointerEvents = 'none';   // let pan/zoom events fall through to the scene
          if (imgAlt) glCanvas.setAttribute('aria-label', imgAlt);
          viewport.appendChild(glCanvas);

          gl = glCanvas.getContext('webgl2', { antialias: false, premultipliedAlpha: false });
          if (!gl) { viewport.removeChild(glCanvas); gl = null; return; }   // no WebGL2 -> keep smooth img

          var maxTex = gl.getParameter(gl.MAX_TEXTURE_SIZE);
          if (natW > maxTex || natH > maxTex) {     // too big for one texture -> keep smooth img
            viewport.removeChild(glCanvas); gl = null; return;
          }

          // GPU context loss (common on mobile under memory pressure / backgrounding):
          // show a soft <img> so the map degrades to visible instead of going blank,
          // then rebuild the texture and resume sharp rendering once it's restored.
          glCanvas.addEventListener('webglcontextlost', function(e) {
            e.preventDefault();              // required, or the context never restores
            glReady = false;
            glCanvas.style.visibility = 'hidden';
            showFallbackImg();
          }, false);
          glCanvas.addEventListener('webglcontextrestored', function() {
            var finish = function(srcImg) {
              if (buildGLResources(srcImg)) {
                glReady = true;
                glCanvas.style.visibility = '';
                removeFallbackImg();
                render();
              }
            };
            // Reuse the already-loaded fallback image if present, else reload pixels.
            if (fallbackImg && fallbackImg.complete && fallbackImg.naturalWidth) {
              finish(fallbackImg);
            } else {
              var tmp = new Image();
              tmp.onload = function() { finish(tmp); };
              tmp.src = imgSrc;
            }
          }, false);

          if (!buildGLResources(img)) { viewport.removeChild(glCanvas); gl = null; return; }
          glReady = true;
          // Free the decoded <img>: remove it from the DOM and drop the reference so
          // its bitmap can be GC'd. Geometry now comes from `fit` + the transform,
          // and the pixels already live in the GPU texture -- roughly halves peak
          // memory (no CPU-side decode kept alongside the texture + mipmaps).
          if (img && img.parentNode) img.parentNode.removeChild(img);
          img = null;
        }

        function render() {
          if (!glReady || !fit.vw) return;
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          var cw = Math.max(1, Math.round(fit.vw * dpr));
          var ch = Math.max(1, Math.round(fit.vh * dpr));
          if (glCanvas.width !== cw || glCanvas.height !== ch) {
            glCanvas.width = cw;
            glCanvas.height = ch;
            glCanvas.style.width = fit.vw + 'px';
            glCanvas.style.height = fit.vh + 'px';
          }
          gl.viewport(0, 0, cw, ch);
          gl.clear(gl.COLOR_BUFFER_BIT);

          // Place the textured quad where the map sits on screen, from the cached
          // fit + current transform (no layout read needed).
          var r = imgScreenRect();
          var x0 = (r.left / fit.vw) * 2 - 1, x1 = ((r.left + r.width) / fit.vw) * 2 - 1;
          var y0 = 1 - (r.top / fit.vh) * 2, y1 = 1 - ((r.top + r.height) / fit.vh) * 2;
          var verts = new Float32Array([
            x0, y0, 0, 0,   x1, y0, 1, 0,   x0, y1, 0, 1,
            x0, y1, 0, 1,   x1, y0, 1, 0,   x1, y1, 1, 1
          ]);
          gl.bindVertexArray(vao);
          gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
          gl.bufferData(gl.ARRAY_BUFFER, verts, gl.DYNAMIC_DRAW);
          gl.drawArrays(gl.TRIANGLES, 0, 6);
        }

        instance.on('transform', render);
        {% endif %}

        // Loose clamp: after the user releases a drag (or wheel-zoom finishes),
        // make sure at least minVis pixels of the image stay inside the viewport
        // on each axis. minVis shrinks as zoom increases — at high zoom you only
        // need a tiny sliver to anchor, otherwise it'd prevent zooming in on
        // edges (the corner can't be brought near the center of a narrow viewport).
        function clampIntoView() {
          if (!fit.vw) return;
          var im = imgScreenRect();          // viewport-relative; viewport is (0,0,vw,vh)
          var t = instance.getTransform();
          var minVis = Math.max(40, 250 / t.scale);
          var right = im.left + im.width, bottom = im.top + im.height;
          var dx = 0, dy = 0;
          if (right < minVis) {
            dx = minVis - right;
          } else if (im.left > fit.vw - minVis) {
            dx = (fit.vw - minVis) - im.left;
          }
          if (bottom < minVis) {
            dy = minVis - bottom;
          } else if (im.top > fit.vh - minVis) {
            dy = (fit.vh - minVis) - im.top;
          }
          if (dx !== 0 || dy !== 0) {
            instance.smoothMoveTo(t.x + dx, t.y + dy);
          }
        }

        instance.on('panend', clampIntoView);
        instance.on('zoomend', clampIntoView);

        // Kick off rendering LAST, so every var (shader sources, etc.) above has
        // been assigned before onImageReady -> setupRenderer runs. If the image is
        // already cached, complete is true and we run synchronously; otherwise wait
        // for load. (Running this earlier hit the var-hoisting trap where cached
        // loads called setupRenderer before VERT_SRC/FRAG_SRC were assigned.)
        if (img.complete && img.naturalWidth) onImageReady();
        else img.addEventListener('load', onImageReady);
      })();
    </script>
  </body>

</html>
