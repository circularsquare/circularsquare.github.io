const W_RANGE = MAX_W - MIN_W;

const LOG_CEIL = Math.log10(W_CEIL);

// with the slopes matched at the knee so there is no kink. sweeping the knee morphs
// the whole scale: knee at the floor → pure log · knee at the ceiling → pure linear.
const KNEE_MIN = 2, KNEE_MAX = LOG_CEIL;   // knee range, in log10(throughput)
let knee = 6;                               // log10 of the knee throughput — default 1M

// paint expression. dragging the knee is a paint swap; the geometry never re-uploads.
let kneeX, kneeA, kneeB, kneeC;
function recalcKnee() {
    kneeX = Math.pow(10, knee);                    // knee throughput
    kneeA = 1 / (LOG_CEIL - knee + Math.LOG10E);   // log-branch slope factor

    kneeC = kneeA * Math.LOG10E / kneeX;           // linear-branch slope

    const c = Math.min(W_CEIL, Math.max(1, d));

// the linear end is far gentler than log, so blend in a ×1→×5 head-start with the
// knee. linearness^2.5 rather than linear: a linear ramp double-boosts mid-range
// lines that are still on the log branch around the slider midpoint (they bulge
// thick before dropping onto the linear branch and thinning at the far end).
// A super-quadratic ramp keeps effMul barely above 1× through the first half of
// the slider (so log-branch lines don't blow up) and pushes the full 5× boost
// into the last quarter where the linear branch needs it.
function linearness() { return (knee - KNEE_MIN) / (KNEE_MAX - KNEE_MIN); }   // 0 log .. 1 linear

// thickness change is only a paint-property swap, never a geometry re-upload.

function tExpr() {

    // d_census / density per the current sourceMode.
    const c = () => ['min', W_CEIL, ['max', 1, densityExpr()]];

        ['>=', c(), kneeX], ['+', ['*', kneeA, ['log10', c()]], kneeB],
        ['*', kneeC, c()]]]];

const coreWidth = (m = effMul()) => ['interpolate', ['linear'], ['zoom'],

function applyWidths() {

    widthRAF = requestAnimationFrame(() => requestAnimationFrame(() => {

        applyWidths();
        refreshWidthSwatches();

}
function refreshWidthSwatches() {
    document.querySelectorAll('#legend .wbar').forEach(el => {

        // opacity instead so the swatch looks like the faint hairline a thin
        // antialiased line draws on the map, not a solid 1px block.

map.on('load', async () => {

        fetch('data/names_en.json').then(r => r.json()),

    for (const f of fc.features) {

    // station bubbles that the selected line stops at

        s.add(p.from); s.add(p.to);

    map.on('contextmenu', (e) => {
        const hits = map.queryRenderedFeatures(e.point, { layers: ['segs-line'] });
        if (hits.length) selectSegment(hits[0].properties);
        else clearSelection();
    });
    map.getCanvasContainer().addEventListener('contextmenu', (ev) => ev.preventDefault());

    applyWidths();
});

// ─────────────────────────── selection / info ────────────────────────────
function selCond(s) {
    const t = [['==', ['get', 'op'], s.op], ['==', ['get', 'line'], s.line]];
    if (s.mode === 'segment') {
        // base mode matches by section (base_from/base_to), so every cut
        // piece of the section lights up together. census / stitched match
        // by per-piece from/to like before.
        const isBase = s.sourceMode === 'base';
        const fk = isBase ? 'base_from' : 'from';
        const tk = isBase ? 'base_to'   : 'to';
        t.push(['==', ['get', fk], s.from], ['==', ['get', tk], s.to]);
    }
    return ['all', ...t];
}

// stations are considered "on" the selected line if the name matches a segment
// endpoint AND the bubble is within ~400m of the line geometry. Name alone is
// not enough: many station names repeat across Japan (and across operators).
const STN_NEAR_DEG2 = 0.004 * 0.004;   // ≈ (400 m)² in degrees, lat-equator approx
function flattenCoords(g) {
    if (!g) return [];
    if (g.type === 'MultiLineString') return g.coordinates.flat();
    return g.coordinates;
}
// Across all sibling features sharing the same (op, line, from, to) label,
// return the two endpoint coords that span the widest extent — and orient
// them so A corresponds to `fromName` when we can tell. Used by both the
// highlight and the display path so they always agree.
//
// Same label gets shared by two physically different things in this data:
//  (a) parallel tracks — siblings are co-located, the farthest pair lands
//      at the section's "real" start/end stations.
//  (b) chained pieces with an inherited erroneous label (the Sanyo
//      Shinkansen bug) — siblings extend the geographic span, and the
//      farthest pair lands at the chain's true outer endpoints.
function effectiveFromToCoords(siblings, fromName) {
    const cs = [];
    for (const f of siblings) {
        const c = flattenCoords(f.geometry);
        if (c.length >= 2) { cs.push(c[0]); cs.push(c[c.length - 1]); }
    }
    if (cs.length < 2) return null;
    let bestD2 = -1, ai = 0, bi = 1;
    for (let i = 0; i < cs.length; i++) {
        for (let j = i + 1; j < cs.length; j++) {
            const dx = cs[i][0] - cs[j][0], dy = cs[i][1] - cs[j][1];
            const d2 = dx * dx + dy * dy;
            if (d2 > bestD2) { bestD2 = d2; ai = i; bi = j; }
        }
    }
    let A = cs[ai], B = cs[bi];
    const NEAR = 0.012 * 0.012;
    const atA = stationByNameNearPoint(fromName, A[0], A[1], NEAR);
    const atB = stationByNameNearPoint(fromName, B[0], B[1], NEAR);
    if (atB && !atA) { const t = A; A = B; B = t; }   // flip — from is at B
    return [A, B];
}
function siblingPieces(p) {
    return allFeats.filter(f =>
        f.properties.op === p.op && f.properties.line === p.line
        && f.properties.from === p.from && f.properties.to === p.to);
}
function geomFromTo(p) {
    let from = p.from, fromOp = p.op, to = p.to, toOp = p.op;
    let fromRescued = false, toRescued = false;
    if (!sfcData) return { from, fromOp, fromRescued, to, toOp, toRescued };
    const ends = effectiveFromToCoords(siblingPieces(p), p.from);
    if (!ends) return { from, fromOp, fromRescued, to, toOp, toRescued };
    const [A, B] = ends;
    // KEEP_R is generous (~5.5 km) so we keep the published name as long as
    // a same-named station exists anywhere near the corresponding endpoint —
    // avoids snapping to incidental neighbours (e.g. the Toyohashi tram's 駅前
    // stop happening to be a few meters closer to the Shinkansen geometry's
    // end than JR 豊橋). Still tight enough to reject the Sanyo Shinkansen
    // case where 姫路 is ~80 km from B (Okayama) under the bogus shared label.
    // When we keep the published name we adopt the matched station's own op
    // for the EN translation lookup — segments may use an op (e.g. JR Central)
    // the EN names table doesn't key on for that station (S12 puts 新横浜
    // under JR East).
    const KEEP_R = 0.05 * 0.05;
    const FB     = 0.012 * 0.012;
    const fns = nearestSameNameStation(p.from, A[0], A[1]);
    if (fns && fns.d2 < KEEP_R) {
        fromOp = fns.f.properties.op;
    } else {
        const ns = nearestStationToPoint(A[0], A[1], FB, p.op);
        if (ns) { from = ns.properties.station; fromOp = ns.properties.op; fromRescued = true; }
    }
    const tns = nearestSameNameStation(p.to, B[0], B[1]);
    if (tns && tns.d2 < KEEP_R) {
        toOp = tns.f.properties.op;
    } else {
        const ns = nearestStationToPoint(B[0], B[1], FB, p.op);
        if (ns) { to = ns.properties.station; toOp = ns.properties.op; toRescued = true; }
    }
    return { from, fromOp, fromRescued, to, toOp, toRescued };
}
function nearestSameNameStation(name, sx, sy) {
    let best = null, bestD2 = Infinity;
    for (const f of sfcData.features) {
        if (f.properties.station !== name) continue;
        const [fx, fy] = f.geometry.coordinates;
        const dx = fx - sx, dy = fy - sy;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestD2) { best = f; bestD2 = d2; }
    }
    return best ? { f: best, d2: bestD2 } : null;
}
function stationByNameNearPoint(name, sx, sy, maxDeg2) {
    let best = null, bestD2 = Infinity;
    for (const f of sfcData.features) {
        if (f.properties.station !== name) continue;
        const [fx, fy] = f.geometry.coordinates;
        const dx = fx - sx, dy = fy - sy;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestD2 && d2 < maxDeg2) { best = f; bestD2 = d2; }
    }
    return best;
}
function nearestStationToPoint(sx, sy, maxDeg2, prefOp) {
    // Prefer a station whose operator matches prefOp; only fall back to the
    // absolutely-nearest station of any op when no prefOp station is in range.
    // Stops us from snapping the JR Tokaido Shinkansen's 豊橋 endpoint onto
    // the Toyohashi tram's 駅前 stop, which happens to sit ~50m closer.
    let bestAny = null, bestAnyD2 = Infinity;
    let bestPref = null, bestPrefD2 = Infinity;
    for (const f of sfcData.features) {
        const [fx, fy] = f.geometry.coordinates;
        const dx = fx - sx, dy = fy - sy;
        const d2 = dx * dx + dy * dy;
        if (d2 >= maxDeg2) continue;
        if (d2 < bestAnyD2) { bestAny = f; bestAnyD2 = d2; }
        if (prefOp && f.properties.op === prefOp && d2 < bestPrefD2) {
            bestPref = f; bestPrefD2 = d2;
        }
    }
    return bestPref || bestAny;
}
// for a station name, find the same-named station that sits closest to any
// point on the supplied LineString. handles same-name collisions, and is
// robust to per-segment geometries that extend past the claimed endpoints
function stationByNameNearLine(name, lineCoords, maxDeg2) {
    let best = null, bestD2 = Infinity;
    for (const f of sfcData.features) {
        if (f.properties.station !== name) continue;
        const [fx, fy] = f.geometry.coordinates;
        let d2 = Infinity;
        for (const c of lineCoords) {
            const dx = c[0] - fx, dy = c[1] - fy;
            const dd = dx * dx + dy * dy;
            if (dd < d2) d2 = dd;
        }
        if (d2 < bestD2 && d2 < maxDeg2) { best = f; bestD2 = d2; }
    }
    return best;
}
function recomputeSelStationIds() {
    selStationIds = new Set();
    if (!selected || !sfcData) return;
    // segment selection: find the stations named from/to that lie closest to
    // the segment geometry. name-driven (not endpoint-driven) so it survives
    // segments whose geometry sprawls past the claimed from/to
    if (selected.mode === 'segment') {
        // base mode selects a whole operator-published section (many cut
        // pieces); match by base_from/base_to so we union every piece's
        // coords for the proximity test.
        const isBase = selected.sourceMode === 'base';
        const pieces = allFeats.filter(f => {
            const q = f.properties;
            if (q.op !== selected.op || q.line !== selected.line) return false;
            return isBase
                ? (q.base_from === selected.from && q.base_to === selected.to)
                : (q.from === selected.from && q.to === selected.to);
        });
        if (!pieces.length) return;
        const coords = [];
        for (const sg of pieces) for (const c of sg.geometry.coordinates) coords.push(c);
        // Same combined-extent + generous keep-radius as geomFromTo so the
        // highlighted stations always match the displayed from/to.
        const ends = effectiveFromToCoords(pieces, selected.from);
        if (!ends) return;
        const [A, B] = ends;
        const KEEP_R = 0.05 * 0.05, FB = 0.012 * 0.012;
        const fns = nearestSameNameStation(selected.from, A[0], A[1]);
        const sa = (fns && fns.d2 < KEEP_R) ? fns.f
                 : nearestStationToPoint(A[0], A[1], FB, selected.op);
        const tns = nearestSameNameStation(selected.to, B[0], B[1]);
        const sb = (tns && tns.d2 < KEEP_R) ? tns.f
                 : nearestStationToPoint(B[0], B[1], FB, selected.op);
        if (sa) selStationIds.add(sa.id);
        if (sb && (!sa || sb.id !== sa.id)) selStationIds.add(sb.id);
        return;
    }
    // line selection: full set of stops, name + proximity to any segment
    const names = stationsOnSelectedLine();
    const segs = allFeats.filter(f =>
        f.properties.op === selected.op && f.properties.line === selected.line);
    if (!names.size || !segs.length) return;
    // cache per-segment bbox once
    for (const sg of segs) {
        if (sg._bbox) continue;
        let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
        for (const c of sg.geometry.coordinates) {
            if (c[0] < minx) minx = c[0]; if (c[0] > maxx) maxx = c[0];
            if (c[1] < miny) miny = c[1]; if (c[1] > maxy) maxy = c[1];
        }
        sg._bbox = [minx, miny, maxx, maxy];
    }
    const PAD = 0.005;
    for (const f of sfcData.features) {
        if (!names.has(f.properties.station)) continue;
        const [sx, sy] = f.geometry.coordinates;
        let hit = false;
        for (const sg of segs) {
            const [minx, miny, maxx, maxy] = sg._bbox;
            if (sx < minx - PAD || sx > maxx + PAD || sy < miny - PAD || sy > maxy + PAD) continue;
            for (const c of sg.geometry.coordinates) {
                const dx = c[0] - sx, dy = c[1] - sy;
                if (dx * dx + dy * dy < STN_NEAR_DEG2) { hit = true; break; }
            }
            if (hit) break;
        }
        if (hit) selStationIds.add(f.id);
    }
}
function pushStationFeatureState() {
    if (!sfcData) return;
    for (const f of sfcData.features) {
        const on = selStationIds.has(f.id);
        map.setFeatureState({ source: 'stations', id: f.id }, { onLine: on });
    }
}

function applySelection() {
    if (!selected) {
        map.setFilter('segs-casing', NO_MATCH);
        map.setPaintProperty('segs-line', 'line-opacity', 0.92);
        if (map.getLayer('station-dots')) {
            map.setPaintProperty('station-dots', 'circle-opacity', 0.5);
            map.setPaintProperty('station-dots', 'circle-stroke-width', 0);
        }
        selStationIds = new Set();
        pushStationFeatureState();
        return;
    }
    const cond = selCond(selected);
    map.setFilter('segs-casing', cond);
    map.setPaintProperty('segs-line', 'line-opacity', ['case', cond, 0.97, 0.13]);

    recomputeSelStationIds();
    pushStationFeatureState();

    if (map.getLayer('station-dots')) {
        const onLine = ['boolean', ['feature-state', 'onLine'], false];
        map.setPaintProperty('station-dots', 'circle-opacity', ['case', onLine, 0.95, 0.08]);
        map.setPaintProperty('station-dots', 'circle-stroke-color', selected.color);
        map.setPaintProperty('station-dots', 'circle-stroke-width', ['case', onLine, 1.5, 0]);
    }
}

function selectLine(p) {
    if (selected && selected.mode === 'line' &&
        selected.op === p.op && selected.line === p.line) { clearSelection(); return; }
    selected = { mode: 'line', op: p.op, line: p.line, color: p.color };
    applySelection();
    renderInfo();
}

function selectSegment(p) {
    // In base mode the right-click unit is the whole operator-published
    // section, identified by base_from/base_to. Stitched/census stay per-piece.
    const isBase = sourceMode === 'base';
    const idFrom = isBase ? p.base_from : p.from;
    const idTo   = isBase ? p.base_to   : p.to;
    if (selected && selected.mode === 'segment'
        && selected.sourceMode === sourceMode
        && selected.op === p.op && selected.line === p.line
        && selected.from === idFrom && selected.to === idTo) {
        clearSelection(); return;
    }
    selected = { mode: 'segment', op: p.op, line: p.line,
                 from: idFrom, to: idTo,
                 color: p.color, density: p.density, d_base: p.d_base,
                 d_census: p.d_census, km: p.km, base_km: p.base_km,
                 detail: p.detail, sourceMode };
    applySelection();
    renderInfo();
}

function clearSelection() {
    if (!selected) return;
    selected = null;
    applySelection();
    document.getElementById('info').style.display = 'none';
}

// ─────────────────────────── colour mode ─────────────────────────────────
function setColorMode(mode) {
    if (mode === colorMode) return;
    colorMode = mode;
    for (const f of allFeats) {
        const p = f.properties;
        p.color = colorMode === 'line' ? p.colorLine : p.colorOp;
    }
    if (fcData) map.getSource('segs').setData(fcData);   // layers read ['get','color']
    if (selected) {
        const f = allFeats.find(x => x.properties.op === selected.op
                                  && x.properties.line === selected.line);
        if (f) selected.color = f.properties.color;
        applySelection();   // refresh station stroke colour
    }
    buildLegend();
    renderInfo();
}

function renderInfo() {
    if (!selected) return;
    const S = STR[lang];
    const box = document.getElementById('info');
    const head = `<div class="ipline" style="color:${selected.color}">` +
                 `${opLabel(selected.op)} ${lineLabel(selected.op, selected.line)}</div>`;

    if (selected.mode === 'segment') {
        // base mode: section unit — sum km across every cut piece; suppress
        // the per-piece census hint since the selection isn't one census row.
        const isBase = selected.sourceMode === 'base';
        let km = Number(selected.km) || 0;
        if (isBase) {
            km = Number(selected.base_km) || 0;
            if (!km) {
                km = 0;
                for (const f of allFeats) {
                    const q = f.properties;
                    if (q.op === selected.op && q.line === selected.line
                        && q.base_from === selected.from && q.base_to === selected.to)
                        km += Number(q.km) || 0;
                }
            }
        }
        const census = (!isBase && selected.detail === 'census')
            ? `<div class="iphint">${S.tipCensus}</div>` : '';
        // non-base: rescue mislabeled from/to via combined sibling extent
        let fromN = selected.from, toN = selected.to, fromOp = selected.op, toOp = selected.op;
        let fromStar = '', toStar = '';
        if (!isBase) {
            const g = geomFromTo({ op: selected.op, line: selected.line,
                                   from: selected.from, to: selected.to });
            fromN = g.from; toN = g.to; fromOp = g.fromOp; toOp = g.toOp;
            if (g.fromRescued) fromStar = '<span class="resc">*</span>';
            if (g.toRescued)   toStar   = '<span class="resc">*</span>';
        }
        box.innerHTML = head +
            `<div class="ipseg">${stnLabel(fromOp, fromN)}${fromStar} → ${stnLabel(toOp, toN)}${toStar}</div>` +
            `<div class="iprow"><span>${S.panelLength}</span>` +
                `<b>${Number(km).toFixed(1)} ${S.km}</b></div>` +
            `<div class="iprow"><span>${S.panelRange}</span>` +
                `<b>${Math.round(Number(modeValue(selected))).toLocaleString()} ${S.perday}</b></div>` +
            census +
            `<div class="iphint">${S.panelHint}</div>`;
    } else {
        const parts = allFeats.filter(f =>
            f.properties.op === selected.op && f.properties.line === selected.line);
        let km = 0, dmin = Infinity, dmax = -Infinity;
        for (const f of parts) {
            const q = f.properties;
            km += Number(q.km) || 0;
            const v = modeValue(q);
            dmin = Math.min(dmin, v);
            dmax = Math.max(dmax, v);
        }
        const range = dmin === dmax ? Math.round(dmin).toLocaleString()
            : Math.round(dmin).toLocaleString() + ' – ' + Math.round(dmax).toLocaleString();
        box.innerHTML = head +
            `<div class="iprow"><span>${S.panelLength}</span><b>${km.toFixed(1)} ${S.km}</b></div>` +
            `<div class="iprow"><span>${S.panelSections}</span><b>${parts.length}</b></div>` +
            `<div class="iprow"><span>${S.panelRange}</span><b>${range} ${S.perday}</b></div>` +
            `<div class="iphint">${S.panelHint}</div>`;
    }
    box.style.display = 'block';
}

window.addEventListener('keydown', (e) => { if (e.key === 'Escape') clearSelection(); });

// ───────────────────────────── interface ─────────────────────────────────
function buildLegend() {
    const S = STR[lang];
    let html = `<span class="close" id="lg-close" title="hide">×</span>` +
        `<div class="hd">${S.legSource}</div>` +
        `<div class="modetoggle dv">` +
        `<span id="src-base" class="${sourceMode === 'base' ? 'on' : ''}">${S.srcBase}</span>` +
        `<span id="src-census" class="${sourceMode === 'census' ? 'on' : ''}">${S.srcCensus}</span>` +
        `</div>` +
        `<div class="modetoggle dv">` +
        `<span id="src-stitched" class="${sourceMode === 'stitched' ? 'on' : ''}">${S.srcStitched}</span>` +
        `</div>`;
    html += `<div class="hd" style="margin-top:7px">${S.legLineColors}</div>` +
        `<div class="modetoggle">` +
        `<span id="cm-op" class="${colorMode === 'operator' ? 'on' : ''}">${S.modeOperator}</span>` +
        `<span id="cm-line" class="${colorMode === 'line' ? 'on' : ''}">${S.modeLine}</span></div>`;

    html += `<div class="widths"><div class="hd">${S.legWidth}</div>`;
    for (const [d, label] of [[1000, '1k'], [20000, '20k'], [200000, '200k'], [1000000, '1M']]) {
        const w = widthFor(d);
        const h = Math.max(w, 1).toFixed(1);
        const op = Math.min(1, w).toFixed(2);
        html += `<div class="wrow"><span class="wbar" data-d="${d}" style="width:34px;height:${h}px;opacity:${op}"></span>${label}</div>`;
    }
    html += `<div class="modetoggle">` +
        `<span id="sm-log" class="${knee === KNEE_MIN ? 'on' : ''}">${S.scaleLog}</span>` +
        `<span id="sm-lin" class="${knee === KNEE_MAX ? 'on' : ''}">${S.scaleLinear}</span></div>`;
    html += '</div>';
    html += `<div class="thick"><div class="hd">${S.legThickness} ` +
            `<span class="val" id="thickVal">×${widthMul.toFixed(1)}</span></div>` +
            `<input id="thickSlider" type="range" min="0.1" max="3" step="0.1" value="${widthMul}"></div>`;
    html += `<div class="thick"><div class="hd">${S.legFloor} ` +
            `<span class="val" id="floorVal">${fmtFloor(knee)}</span></div>` +
            `<input id="floorSlider" type="range" min="${KNEE_MIN}" max="${KNEE_MAX}" step="0.01" value="${knee}"></div>`;

    html += `<div class="stsec">` +
            `<div class="hd">${S.toggleStations}</div>` +
            `<div class="strow">` +
            `<input type="checkbox" id="st-toggle"${showStations ? ' checked' : ''}>` +
            `<input id="bubbleSlider" type="range" min="0.1" max="3" step="0.1" value="${stationMul}">` +
            `</div></div>`;
    document.getElementById('legend').innerHTML = html;

    document.getElementById('lg-close').onclick = () => setLegendOpen(false);
    document.getElementById('src-base').onclick = () => setSourceMode('base');
    document.getElementById('src-census').onclick = () => setSourceMode('census');
    document.getElementById('src-stitched').onclick = () => setSourceMode('stitched');
    document.getElementById('cm-op').onclick = () => setColorMode('operator');
    document.getElementById('cm-line').onclick = () => setColorMode('line');
    document.getElementById('sm-log').onclick = () => snapKnee('log');
    document.getElementById('sm-lin').onclick = () => snapKnee('linear');

    const sl = document.getElementById('thickSlider');
    sl.oninput = () => {
        widthMul = parseFloat(sl.value);
        document.getElementById('thickVal').textContent = '×' + widthMul.toFixed(1);
        refreshWidths();
    };
    const fs = document.getElementById('floorSlider');
    fs.oninput = () => {
        knee = parseFloat(fs.value);
        document.getElementById('floorVal').textContent = fmtFloor(knee);
        document.getElementById('sm-log').classList.toggle('on', knee === KNEE_MIN);
        document.getElementById('sm-lin').classList.toggle('on', knee === KNEE_MAX);
        refreshWidths();
    };
    document.getElementById('st-toggle').onchange = (e) => {
        showStations = e.target.checked;
        if (map.getLayer('station-dots'))
            map.setLayoutProperty('station-dots', 'visibility',
                                  showStations ? 'visible' : 'none');
    };
    document.getElementById('bubbleSlider').oninput = (e) => {
        stationMul = parseFloat(e.target.value);
        applyStationSize();
    };
}

function applyLang() {
    const S = STR[lang];
    document.title = S.h1 + ' — japan rail flow';
    document.getElementById('t-h1').textContent = S.h1;
    document.getElementById('t-sub').innerHTML = S.sub1;
    document.getElementById('lang-en').classList.toggle('on', lang === 'en');
    document.getElementById('lang-ja').classList.toggle('on', lang === 'ja');
    document.getElementById('aboutbtn').title = S.aboutTitle;
    document.getElementById('aboutpanel').innerHTML = S.aboutBody;
    buildLegend();
    renderInfo();
}

document.getElementById('lang-en').onclick = () => { lang = 'en'; applyLang(); };
document.getElementById('lang-ja').onclick = () => { lang = 'ja'; applyLang(); };
function setAboutOpen(v) {
    if (aboutOpen === v) return;
    aboutOpen = v;
    document.getElementById('aboutbtn').classList.toggle('on', aboutOpen);
    document.getElementById('aboutpanel').classList.toggle('open', aboutOpen);
}
let legendOpen = true;
function setLegendOpen(v) {
    if (legendOpen === v) return;
    legendOpen = v;
    document.getElementById('legend').classList.toggle('hidden', !legendOpen);
    document.getElementById('ctrlbtn').classList.toggle('show', !legendOpen);
}
document.getElementById('ctrlbtn').onclick = () => setLegendOpen(true);
document.getElementById('aboutbtn').onclick = (e) => {
    e.stopPropagation();
    setAboutOpen(!aboutOpen);
};
document.getElementById('aboutpanel').addEventListener('click', (e) => e.stopPropagation());
// Clicking anywhere outside the panel or the toggle closes the panel.
document.addEventListener('click', () => { if (aboutOpen) setAboutOpen(false); });
applyLang();
</script>
</body>
</html>
